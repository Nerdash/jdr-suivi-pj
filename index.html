<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Cantrip</title>
<meta name="theme-color" content="#ecdcb0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg-gradient-1: #f6ecd2;
    --bg-gradient-2: #ecdcb0;
    --bg-deep: #e2cd9c;
    --bg-card: #f1e2bc;
    --bg-card-alt: #e8d7ab;
    --bg-nav: #e6d4a2;
    --border-strong: #8a6a3a;
    --border-tint: 122,90,42;
    --border-card: rgba(var(--border-tint), 0.2);
    --text-main: #3a2a15;
    --text-gold: #8a5a16;
    --text-label: #7a6440;
    --text-muted: #8f7850;
    --text-dim: #a89470;
    --text-desc: #5c4a2c;
    --text-note: #7a6440;
    --text-chip: #6b5430;
    --accent-red-text: #b91c1c;
    --accent-green-text: #157a3d;
    --accent-blue-text: #0a6ea8;
    --accent-purple-text: #6d28d9;
    --accent-purple-solid: #7c3aed;
    --accent-gray-text: #55503f;
    --accent-gold-badge-text: #7c4a12;
    --bg-texture: rgba(90,60,20,0.035);
    --checkbox-border-idle: rgba(58,42,21,0.3);
    --ink-bright: #efe4cf;
    --ink-dark: #171209;
  }
  :root[data-theme="deneor"] {
    --bg-gradient-1: #1a3327;
    --bg-gradient-2: #0d1b15;
    --bg-deep: #0a1712;
    --bg-card: #173224;
    --bg-card-alt: #12281c;
    --bg-nav: #0f2018;
    --border-strong: #154734;
    --border-tint: 90,170,130;
    --text-main: #e7f1ea;
    --text-gold: #e6c988;
    --text-label: #a9c9b4;
    --text-muted: #8caf9b;
    --text-dim: #4f6f5c;
    --text-desc: #cfe2d5;
    --text-note: #83a692;
    --text-chip: #bcd6c4;
    --accent-red-text: #fca5a5;
    --accent-green-text: #86efac;
    --accent-blue-text: #7dd3fc;
    --accent-purple-text: #c4b5fd;
    --accent-purple-solid: #a78bfa;
    --accent-gray-text: #cbd5e1;
    --accent-gold-badge-text: #e0c890;
    --bg-texture: rgba(255,255,255,0.012);
    --checkbox-border-idle: rgba(255,255,255,0.25);
  }
  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg-deep);
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  body {
    font-family: -apple-system, 'SF Pro', system-ui, sans-serif;
    color: var(--text-main);
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    height: 100vh;
    height: 100dvh;
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(160deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%),
      repeating-linear-gradient(45deg, var(--bg-texture) 0px, var(--bg-texture) 2px, transparent 2px, transparent 7px);
    box-sizing: border-box;
    padding: max(20px, env(safe-area-inset-top) + 14px) max(18px, env(safe-area-inset-right) + 4px) max(16px, env(safe-area-inset-bottom) + 12px) max(18px, env(safe-area-inset-left) + 4px);
    display: flex;
    flex-direction: column;
  }
  .font-cinzel { font-family: 'Cinzel', serif; }
  input::placeholder { color: var(--text-dim); }
  .hscroll { scrollbar-width: none; -ms-overflow-style: none; }
  .hscroll::-webkit-scrollbar { display: none; }
  .badge { flex: none; width: 40px; height: 40px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; user-select: none; }
  .badge-used { background: rgba(239,68,68,0.14); border: 1px solid rgba(239,68,68,0.45); color: var(--accent-red-text); font-weight: 600; }
  .badge-available { background: rgba(34,197,94,0.16); border: 1px solid rgba(34,197,94,0.5); color: var(--accent-green-text); font-weight: 700; }
  .toggle-track { width: 40px; height: 24px; border-radius: 12px; position: relative; cursor: pointer; flex: none; transition: background 150ms; }
  .toggle-knob { width: 18px; height: 18px; border-radius: 9px; background: var(--ink-bright); position: absolute; top: 3px; transition: left 150ms; }
  .icon-btn { width: 44px; height: 44px; border-radius: 6px; background: var(--bg-card); border: 1px solid var(--border-card); display: flex; align-items: center; justify-content: center; color: var(--text-label); cursor: pointer; flex: none; }
  input:disabled { opacity: 0.45; }
  @keyframes concentration-pulse {
    0%, 100% { box-shadow: inset 0 0 0 0 rgba(167,139,250,0); }
    50% { box-shadow: inset 0 0 10px 3px rgba(167,139,250,0.7); }
  }
  .concentration-active { animation: concentration-pulse 1.7s ease-in-out infinite; }
  @keyframes grimoire-slide-next {
    from { opacity: 0; transform: translateX(28px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes grimoire-slide-prev {
    from { opacity: 0; transform: translateX(-28px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .grimoire-anim-next { animation: grimoire-slide-next 420ms ease-out; }
  .grimoire-anim-prev { animation: grimoire-slide-prev 420ms ease-out; }
  @keyframes character-slide-next {
    from { opacity: 0; transform: translateX(60px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes character-slide-prev {
    from { opacity: 0; transform: translateX(-60px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .character-anim-next { animation: character-slide-next 650ms ease-in-out; }
  .character-anim-prev { animation: character-slide-prev 650ms ease-in-out; }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  'use strict';

  var STORAGE_KEY = 'jdr_character_tracker_state';

  function cloneDeep(x) {
    return JSON.parse(JSON.stringify(x));
  }

  function makeSpellLevels() {
    var levels = [];
    for (var i = 1; i <= 9; i++) {
      levels.push({ level: i, enabled: false, max: 0, used: [] });
    }
    return levels;
  }

  var ABILITY_KEYS = ['force', 'dexterite', 'constitution', 'intelligence', 'sagesse', 'charisme'];
  var ABILITY_LABELS = { force: 'Force', dexterite: 'Dextérité', constitution: 'Constitution', intelligence: 'Intelligence', sagesse: 'Sagesse', charisme: 'Charisme' };
  var SKILL_NAMES = ['Acrobaties', 'Arcanes', 'Athlétisme', 'Discrétion', 'Dressage', 'Escamotage', 'Histoire', 'Intimidation', 'Intuition', 'Investigation', 'Médecine', 'Nature', 'Perception', 'Persuasion', 'Religion', 'Représentation', 'Survie', 'Tromperie'];

  function makeAbilityScores() {
    var scores = {};
    ABILITY_KEYS.forEach(function (k) { scores[k] = 0; });
    return scores;
  }

  function makeSavingThrows() {
    var throws = {};
    ABILITY_KEYS.forEach(function (k) { throws[k] = 0; });
    return throws;
  }

  function makeSkills() {
    return SKILL_NAMES.map(function (name) { return { name: name, modifier: 0 }; });
  }

  function generateId() {
    return 'cr_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
  }

  function makeClassResource(label, max) {
    return { id: generateId(), label: label || 'Ressource de Classe', max: max || 0, used: [] };
  }

  function defaultProfile() {
    return {
      characterName: 'Mon Personnage',
      hp: { current: 10, max: 10, temp: 0 },
      combatStats: { ac: 10, initiative: 0, speed: 9 },
      spellLevels: makeSpellLevels(),
      classResources: [],
      concentration: false,
      inspiration: false,
      abilityScores: makeAbilityScores(),
      savingThrows: makeSavingThrows(),
      skills: makeSkills(),
      preparedSpells: []
    };
  }

  function sanitizeProfile(p) {
    if (typeof p.characterName !== 'string' || !p.characterName) p.characterName = 'Mon Personnage';
    if (typeof p.concentration !== 'boolean') p.concentration = false;
    if (typeof p.inspiration !== 'boolean') p.inspiration = false;
    if (!p.hp || typeof p.hp !== 'object') p.hp = { current: 10, max: 10, temp: 0 };
    if (typeof p.hp.max !== 'number' || isNaN(p.hp.max)) p.hp.max = 10;
    p.hp.max = clamp(p.hp.max, 0, 999);
    if (typeof p.hp.current !== 'number' || isNaN(p.hp.current)) p.hp.current = p.hp.max;
    p.hp.current = clamp(p.hp.current, 0, p.hp.max);
    if (typeof p.hp.temp !== 'number' || isNaN(p.hp.temp)) p.hp.temp = 0;
    p.hp.temp = clamp(p.hp.temp, 0, 999);
    if (!Array.isArray(p.spellLevels) || p.spellLevels.length !== 9) {
      p.spellLevels = makeSpellLevels();
    } else {
      p.spellLevels.forEach(function (l, i) {
        if (typeof l.level !== 'number') l.level = i + 1;
        if (typeof l.enabled !== 'boolean') l.enabled = false;
        if (typeof l.max !== 'number' || isNaN(l.max)) l.max = 0;
        l.max = clamp(l.max, 0, 12);
        l.used = resizeUsedArray(l.used, l.max);
      });
    }
    if (!p.combatStats || typeof p.combatStats !== 'object') p.combatStats = { ac: 10, initiative: 0, speed: 9 };
    if (typeof p.combatStats.ac !== 'number' || isNaN(p.combatStats.ac)) p.combatStats.ac = 10;
    if (typeof p.combatStats.initiative !== 'number' || isNaN(p.combatStats.initiative)) p.combatStats.initiative = 0;
    if (typeof p.combatStats.speed !== 'number' || isNaN(p.combatStats.speed)) p.combatStats.speed = 9;
    if (!p.abilityScores || typeof p.abilityScores !== 'object') p.abilityScores = makeAbilityScores();
    ABILITY_KEYS.forEach(function (k) {
      if (typeof p.abilityScores[k] !== 'number' || isNaN(p.abilityScores[k])) p.abilityScores[k] = 0;
    });
    if (!p.savingThrows || typeof p.savingThrows !== 'object') p.savingThrows = makeSavingThrows();
    ABILITY_KEYS.forEach(function (k) {
      if (typeof p.savingThrows[k] !== 'number' || isNaN(p.savingThrows[k])) p.savingThrows[k] = 0;
    });
    if (!Array.isArray(p.skills) || p.skills.length !== SKILL_NAMES.length) {
      p.skills = makeSkills();
    } else {
      p.skills.forEach(function (s, i) {
        if (typeof s.modifier !== 'number' || isNaN(s.modifier)) s.modifier = 0;
        if (typeof s.name !== 'string') s.name = SKILL_NAMES[i];
      });
    }
    if (!Array.isArray(p.classResources)) {
      if (p.classResource && typeof p.classResource === 'object' && p.classResource.enabled) {
        var oldMax = typeof p.classResource.max === 'number' ? p.classResource.max : 0;
        p.classResources = [{
          id: generateId(),
          label: typeof p.classResource.label === 'string' ? p.classResource.label : 'Ressource de Classe',
          max: oldMax,
          used: resizeUsedArray(p.classResource.used, oldMax)
        }];
      } else {
        p.classResources = [];
      }
    }
    delete p.classResource;
    p.classResources.forEach(function (cr) {
      if (typeof cr.id !== 'string' || !cr.id) cr.id = generateId();
      if (typeof cr.label !== 'string') cr.label = 'Ressource de Classe';
      if (typeof cr.max !== 'number' || isNaN(cr.max)) cr.max = 0;
      cr.max = Math.max(0, Math.min(20, cr.max));
      cr.used = resizeUsedArray(cr.used, cr.max);
    });
    if (!Array.isArray(p.preparedSpells)) p.preparedSpells = [];
    else p.preparedSpells = p.preparedSpells.filter(function (n) { return typeof n === 'string'; });
    return p;
  }

  var CHARACTER_ORDER = ['calix', 'deneor'];

  function calixDefaultProfile() {
    return sanitizeProfile({
      characterName: 'Calix Noctavel',
      hp: { current: 42, max: 42, temp: 0 },
      combatStats: { ac: 15, initiative: 3, speed: 9 },
      spellLevels: [
        { level: 1, enabled: true, max: 4, used: [false, false, false, false] },
        { level: 2, enabled: true, max: 3, used: [false, false, false] },
        { level: 3, enabled: true, max: 3, used: [false, false, false] },
        { level: 4, enabled: true, max: 1, used: [false] },
        { level: 5, enabled: false, max: 0, used: [] },
        { level: 6, enabled: false, max: 0, used: [] },
        { level: 7, enabled: false, max: 0, used: [] },
        { level: 8, enabled: false, max: 0, used: [] },
        { level: 9, enabled: false, max: 0, used: [] }
      ],
      classResources: [
        { id: 'cr_calix_inspiration', label: 'Inspiration bardique', max: 4, used: [false, false, false, false] }
      ],
      concentration: false,
      inspiration: true,
      abilityScores: { force: -1, dexterite: 2, constitution: 1, intelligence: 2, sagesse: 1, charisme: 4 },
      savingThrows: { force: 1, dexterite: 5, constitution: 1, intelligence: 2, sagesse: 1, charisme: 7 },
      skills: [
        { name: 'Acrobaties', modifier: 3 },
        { name: 'Arcanes', modifier: 8 },
        { name: 'Athlétisme', modifier: 0 },
        { name: 'Discrétion', modifier: 3 },
        { name: 'Dressage', modifier: 2 },
        { name: 'Escamotage', modifier: 3 },
        { name: 'Histoire', modifier: 8 },
        { name: 'Intimidation', modifier: 5 },
        { name: 'Intuition', modifier: 4 },
        { name: 'Investigation', modifier: 5 },
        { name: 'Médecine', modifier: 2 },
        { name: 'Nature', modifier: 3 },
        { name: 'Perception', modifier: 4 },
        { name: 'Persuasion', modifier: 7 },
        { name: 'Religion', modifier: 3 },
        { name: 'Représentation', modifier: 5 },
        { name: 'Survie', modifier: 2 },
        { name: 'Tromperie', modifier: 5 }
      ]
    });
  }

  function deneorDefaultProfile() {
    return sanitizeProfile({
      characterName: 'Deneor Sentariel',
      hp: { current: 73, max: 73, temp: 0 },
      combatStats: { ac: 23, initiative: 4, speed: 9 },
      spellLevels: [
        { level: 1, enabled: true, max: 4, used: [false, false, false, false] },
        { level: 2, enabled: true, max: 3, used: [false, false, false] },
        { level: 3, enabled: false, max: 0, used: [] },
        { level: 4, enabled: false, max: 0, used: [] },
        { level: 5, enabled: false, max: 0, used: [] },
        { level: 6, enabled: false, max: 0, used: [] },
        { level: 7, enabled: false, max: 0, used: [] },
        { level: 8, enabled: false, max: 0, used: [] },
        { level: 9, enabled: false, max: 0, used: [] }
      ],
      classResources: [
        { id: 'cr_deneor_conduit', label: 'Conduit divin', max: 1, used: [false] }
      ],
      concentration: false,
      inspiration: false,
      abilityScores: { force: 3, dexterite: -1, constitution: 2, intelligence: 0, sagesse: 1, charisme: 2 },
      savingThrows: { force: 3, dexterite: -1, constitution: 2, intelligence: 0, sagesse: 4, charisme: 5 },
      skills: [
        { name: 'Acrobaties', modifier: -1 },
        { name: 'Arcanes', modifier: 0 },
        { name: 'Athlétisme', modifier: 6 },
        { name: 'Discrétion', modifier: -1 },
        { name: 'Dressage', modifier: 4 },
        { name: 'Escamotage', modifier: -1 },
        { name: 'Histoire', modifier: 0 },
        { name: 'Intimidation', modifier: 3 },
        { name: 'Intuition', modifier: 1 },
        { name: 'Investigation', modifier: 3 },
        { name: 'Médecine', modifier: 1 },
        { name: 'Nature', modifier: 0 },
        { name: 'Perception', modifier: 1 },
        { name: 'Persuasion', modifier: 5 },
        { name: 'Religion', modifier: 3 },
        { name: 'Représentation', modifier: 3 },
        { name: 'Survie', modifier: 4 },
        { name: 'Tromperie', modifier: 3 }
      ],
      preparedSpells: [
        'Bouclier de la foi', 'Cérémonie', 'Châtiment calcinant', 'Châtiment courroucé',
        'Châtiment tonitruant', 'Détection de la magie', 'Détection du mal et du bien'
      ]
    });
  }

  function makeCharacter(id, name, subtitle, level, portrait, theme, profile) {
    var p = profile || defaultProfile();
    p.characterName = name;
    return { id: id, name: name, subtitle: subtitle, level: level, portrait: portrait, theme: theme, savedProfile: p };
  }

  function defaultCharacters() {
    return {
      calix: makeCharacter('calix', 'Calix Noctavel', 'Barde du Collège du Savoir', 7, 'characters/calix.jpg', 'calix', calixDefaultProfile()),
      deneor: makeCharacter('deneor', 'Deneor Sentariel', 'Paladin sous Serment des Anciens', null, 'characters/deneor.png', 'deneor', deneorDefaultProfile())
    };
  }

  function defaultState() {
    var characters = defaultCharacters();
    return {
      version: 2,
      activeProfileIndex: 0,
      profiles: [cloneDeep(characters.calix.savedProfile)],
      activeCharacterId: 'calix',
      characters: characters
    };
  }

  // ---- persistence ----
  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      var parsed = JSON.parse(raw);
      if (!parsed || !Array.isArray(parsed.profiles) || !parsed.profiles.length) return defaultState();
      parsed.profiles.forEach(sanitizeProfile);
      delete parsed.theme;

      var defaults = defaultCharacters();
      if (!parsed.characters || typeof parsed.characters !== 'object') {
        defaults.calix.savedProfile = cloneDeep(parsed.profiles[0]);
        parsed.characters = defaults;
      } else {
        CHARACTER_ORDER.forEach(function (id) {
          var c = parsed.characters[id];
          if (!c || typeof c !== 'object') { parsed.characters[id] = defaults[id]; return; }
          c.id = id;
          // name/subtitle/level/portrait/theme ne sont éditables nulle part dans l'UI : toujours
          // resynchronisés depuis les valeurs par défaut du code pour que les corrections de texte
          // (typos, etc.) atteignent aussi les sauvegardes existantes, pas seulement les nouvelles.
          c.name = defaults[id].name;
          c.subtitle = defaults[id].subtitle;
          c.level = defaults[id].level;
          c.portrait = defaults[id].portrait;
          c.theme = defaults[id].theme;
          if (!c.savedProfile || typeof c.savedProfile !== 'object') c.savedProfile = defaults[id].savedProfile;
          else sanitizeProfile(c.savedProfile);
        });
      }
      if (parsed.activeCharacterId !== 'calix' && parsed.activeCharacterId !== 'deneor') parsed.activeCharacterId = 'calix';
      return parsed;
    } catch (e) {
      return defaultState();
    }
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) { /* localStorage unavailable or full: state stays in memory only */ }
  }

  var THEME_COLOR_META = { calix: '#ecdcb0', deneor: '#0a1712' };

  function activeTheme() {
    var character = state.characters[state.activeCharacterId];
    return (character && character.theme) || 'calix';
  }

  function applyTheme() {
    var theme = activeTheme();
    document.documentElement.setAttribute('data-theme', theme);
    var themeColorMeta = document.querySelector('meta[name="theme-color"]');
    if (themeColorMeta) themeColorMeta.setAttribute('content', THEME_COLOR_META[theme] || THEME_COLOR_META.calix);
  }

  var state = loadState();
  applyTheme();

  // ---- ephemeral UI state (not persisted) ----
  var ui = {
    view: 'tracker', // 'tracker' | 'stats' | 'grimoire' | 'grimoire-prepare' | 'settings' | 'settings-character' | 'settings-grimoire' | 'settings-app' | 'settings-load-character'
    editingMax: false,
    editingTemp: false,
    shortRestOpen: false,
    shortRestChecks: { hp: false, spells: false, tempHp: false, classResource: false },
    statsSearch: '',
    grimoireTab: 0, // niveau numérique (0..9) ou 'classe'
    grimoireAnimDirection: null, // 'next' | 'prev' | null — consommé une fois par renderGrimoire()/renderGrimoirePrepare()
    grimoireFilters: { action: false, bonus: false, reaction: false }, // conservés entre les onglets de niveau
    prepareFilters: { action: false, bonus: false, classe: false }, // filtres propres à la page "Préparation de sorts" (Deneor)
    grimoirePrepareBackView: 'grimoire', // vue vers laquelle revenir depuis "Préparation de sorts"
    settingsLevelError: '',
    disableLevelDialog: null, // { level: number } quand la confirmation de désactivation est ouverte
    characterCarouselIndex: 0, // index dans CHARACTER_ORDER, propre à l'écran "Charger un personnage"
    characterCarouselAnimDirection: null, // 'next' | 'prev' | null — consommé une fois par renderSettingsLoadCharacter()
    characterNotice: null, // { id, text } — message transitoire (mise à jour / import réussis), propre au personnage affiché
    characterImportError: null // message d'erreur transitoire si le JSON importé est invalide
  };

  function profile() { return state.profiles[state.activeProfileIndex]; }

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function toInt(v, fallback) {
    var n = parseInt(String(v).replace(/[^0-9-]/g, ''), 10);
    return isNaN(n) ? fallback : n;
  }
  function formatSigned(v) {
    return (v >= 0 ? '+' : '') + v;
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function resizeUsedArray(arr, max) {
    var out = [];
    for (var i = 0; i < max; i++) out.push(!!(arr && arr[i]));
    return out;
  }

  function iconGear(filled) {

          { name: "Aura de protection", type: "PASSIF", range: "3m (9m niv.18)", desc: "Le lanceur et les alliés proches gagnent un bonus aux jets de sauvegarde égal au mod. Cha (min. +1), tant que le lanceur n'est pas neutralisé.", note: "Dès le niveau 6. Se positionner au centre du groupe pour en faire profiter le plus d'alliés possible." },
          { name: "Aura de bravoure", type: "PASSIF", range: "3m (9m niv.18)", desc: "Le lanceur et les alliés proches sont immunisés à l'effroi tant que le lanceur reste conscient.", note: "Dès le niveau 10. Même portée et règles de cumul que l'Aura de protection : les deux se complètent naturellement." },
          { name: "Colère de la nature (Canalisation)", type: "ACTION", range: "3m", desc: "Des lianes spectrales entourent une créature visible. JS Force ou Dextérité (au choix de la cible) ou entravé ; nouveau JS à chaque fin de tour pour se libérer.", note: "1x par repos court ou long (partagé avec Repousser les infidèles). Bon contrôle d'une cible isolée." },
          { name: "Repousser les infidèles (Canalisation)", type: "ACTION", range: "9m", desc: "Chaque fée ou fiélon dans le rayon qui entend doit réussir un JS Sagesse ou fuir pendant 1 minute ou jusqu'à subir des dégâts.", note: "Très situationnel : n'affecte ni les morts-vivants ni les humanoïdes." },
          { name: "Aura de protection contre la magie", type: "PASSIF", range: "3m (9m niv.18)", desc: "Le lanceur et ses alliés proches bénéficient d'une résistance aux dégâts infligés par les sorts.", note: "Dès le niveau 7. Purement passif : se positionner près du groupe avant le combat." },
          { name: "Sentinelle increvable", type: "PASSIF", range: "Personnel", desc: "Si réduit à 0 PV sans être tué net, peut choisir de tomber à 1 PV à la place. Également immunisé au vieillissement magique.", note: "Dès le niveau 15, 1x par repos long. À garder comme filet de sécurité en fin de combat." },
          { name: "Champion vénérable", type: "ACTION", range: "Personnel · 1 min", desc: "Transformation en avatar de la nature : regagne 10 PV au début de chaque tour, sorts de paladin castables en action bonus, ennemis proches en désavantage aux JS contre les sorts et la Canalisation Divine du lanceur.", note: "Capacité ultime de niveau 20, 1x par repos long : réserver aux affrontements décisifs." }
        ]
      }
    ]
  };

  function activeSpellbook() {
    return state.activeCharacterId === 'deneor' ? DENEOR_SPELLBOOK : SPELLBOOK;
  }

  function spellBadgeStyle(type) {
    var t = type.toUpperCase();
    if (t.indexOf('BONUS') === 0) return 'background:rgba(34,197,94,0.16);border:1px solid rgba(34,197,94,0.45);color:var(--accent-green-text);';
    if (t.indexOf('RÉACTION') === 0) return 'background:rgba(239,68,68,0.16);border:1px solid rgba(239,68,68,0.45);color:var(--accent-red-text);';
    if (t.indexOf('RITUEL') === 0) return 'background:rgba(167,139,250,0.16);border:1px solid rgba(167,139,250,0.45);color:var(--accent-purple-text);';
    if (t.indexOf('PASSIF') === 0) return 'background:rgba(148,163,184,0.16);border:1px solid rgba(148,163,184,0.45);color:var(--accent-gray-text);';
    if (t.indexOf('ACTION') === 0) return 'background:rgba(125,211,252,0.16);border:1px solid rgba(125,211,252,0.45);color:var(--accent-blue-text);';
    return 'background:rgba(var(--border-tint),0.16);border:1px solid rgba(var(--border-tint),0.45);color:var(--accent-gold-badge-text);';
  }

  // ---- render ----
  var app = document.getElementById('app');

  var PAGES = [
    { view: 'tracker', label: 'Suivi', icon: iconTracker },
    { view: 'stats', label: 'Personnage', icon: iconCharacter },
    { view: 'grimoire', label: 'Grimoire', icon: iconBook },
    { view: 'settings', label: 'Paramètres', icon: iconGear }
  ];

  function renderPage() {
    switch (ui.view) {
      case 'stats': return renderStats();
      case 'grimoire': return renderGrimoire();
      case 'grimoire-prepare': return renderGrimoirePrepare();
      case 'settings': return renderSettings();
      case 'settings-character': return renderSettingsCharacter();
      case 'settings-grimoire': return renderSettingsGrimoire();
      case 'settings-app': return renderSettingsApp();
      case 'settings-load-character': return renderSettingsLoadCharacter();
      default: return renderTracker();
    }
  }

  function renderBottomNav() {
    var itemsHtml = PAGES.map(function (page) {
      var active = page.view === 'settings' ? ui.view.indexOf('settings') === 0 :
        page.view === 'grimoire' ? ui.view.indexOf('grimoire') === 0 :
        ui.view === page.view;
      return '<div data-action="nav" data-view="' + page.view + '" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 0;cursor:pointer;color:' + (active ? 'var(--text-gold)' : 'var(--text-dim)') + '">' +
        page.icon(active) +
        '<div style="font-size:10px;font-weight:600;letter-spacing:0.02em">' + page.label + '</div>' +
        '</div>';
    }).join('');
    return '<div style="flex:none;display:flex;align-items:stretch;border-top:1px solid rgba(var(--border-tint),0.2);background:var(--bg-nav);border-radius:12px;overflow:hidden;margin-top:4px">' + itemsHtml + '</div>';
  }

  function render() {
    document.title = 'Suivi — ' + (profile().characterName || 'Personnage');
    var prevScroller = app.querySelector('[data-scroll-root]');
    var scrollTop = prevScroller ? prevScroller.scrollTop : 0;
    var searchHadFocus = document.activeElement && document.activeElement.id === 'statsSearchInput';
    app.innerHTML =
      '<div style="display:flex;flex-direction:column;height:100%">' +
        '<div style="flex:1;min-height:0;display:flex;flex-direction:column">' + renderPage() + '</div>' +
        renderBottomNav() +
      '</div>';
    if (ui.shortRestOpen) {
      app.insertAdjacentHTML('beforeend', renderShortRestModal());
    }
    if (ui.disableLevelDialog) {
      app.insertAdjacentHTML('beforeend', renderDisableLevelModal());
    }
    var nextScroller = app.querySelector('[data-scroll-root]');
    if (nextScroller) nextScroller.scrollTop = scrollTop;
    bindEvents(searchHadFocus);
  }

  function renderTracker() {
    var p = profile();
    var hp = p.hp;
    var activeCharacter = state.characters[state.activeCharacterId];

    var maxHtml = ui.editingMax
      ? '<input id="hpMaxInput" type="text" inputmode="numeric" pattern="[0-9]*" value="' + hp.max + '" style="width:60px;font-size:19px;color:var(--text-main);background:transparent;border:none;border-bottom:1px solid #ef4444;outline:none;padding:0"/>'
      : '<div id="hpMaxDisplay" style="font-size:19px;color:var(--text-muted);cursor:pointer;border-bottom:1px dashed var(--border-strong)">' + hp.max + '</div>';

    var tempHtml;
    if (ui.editingTemp) {
      tempHtml = '<div style="display:flex;align-items:baseline;gap:2px;margin-left:8px">' +
        '<div style="font-size:19px;font-weight:700;color:var(--accent-blue-text)">+</div>' +
        '<input id="tempInput" type="text" inputmode="numeric" pattern="[0-9]*" value="' + hp.temp + '" style="width:44px;font-size:19px;font-weight:700;color:var(--accent-blue-text);background:transparent;border:none;border-bottom:1px solid var(--accent-blue-text);outline:none;padding:0"/></div>';
    } else {
      tempHtml = '<div id="tempDisplay" style="font-size:19px;font-weight:700;color:var(--accent-blue-text);cursor:pointer;border-bottom:1px dashed rgba(125,211,252,0.5);margin-left:8px">+' + hp.temp + '</div>';
    }

    var spellGroupsHtml = p.spellLevels
      .filter(function (l) { return l.enabled && l.max > 0; })
      .map(function (l) {
        var badges = l.used.map(function (used, i) {
          return '<div class="badge ' + (used ? 'badge-used' : 'badge-available') + '" data-action="toggle-spell" data-level="' + l.level + '" data-index="' + i + '">' + l.level + '</div>';
        }).join('');
        return '<div style="display:flex;flex-direction:column;gap:4px">' +
          '<div style="font-size:11px;color:var(--text-muted);font-weight:600">Niveau ' + l.level + '</div>' +
          '<div class="hscroll" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:2px">' + badges + '</div>' +
          '</div>';
      }).join('');

    var classHtml = p.classResources.map(function (cr) {
      var cbadges = cr.used.map(function (used, i) {
        return '<div class="badge ' + (used ? 'badge-used' : 'badge-available') + '" data-action="toggle-class" data-id="' + cr.id + '" data-index="' + i + '">' + (i + 1) + '</div>';
      }).join('');
      return '<div style="display:flex;flex-direction:column;gap:6px">' +
        '<div style="font-size:12px;font-weight:600;color:var(--text-label);text-transform:uppercase;letter-spacing:0.08em">' + escapeHtml(cr.label || 'Ressource') + '</div>' +
        '<div class="hscroll" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:2px">' + cbadges + '</div>' +
        '</div>';
    }).join('<div style="height:10px"></div>');

    var combatStatsHtml = [
      { label: 'CA', value: p.combatStats.ac },
      { label: 'Initiative', value: formatSigned(p.combatStats.initiative) },
      { label: 'Déplacement', value: p.combatStats.speed + 'm' }
    ].map(function (stat) {
      return '<div style="display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--bg-card);border:1px solid rgba(var(--border-tint),0.2);border-radius:10px;padding:7px 6px">' +
        '<div style="font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em">' + stat.label + '</div>' +
        '<div style="font-size:17px;font-weight:700;color:var(--text-gold)" class="font-cinzel">' + stat.value + '</div>' +
        '</div>';
    }).join('');

    return (
      '<div style="display:flex;flex-direction:column;height:100%;gap:14px">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">' +
          '<div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">' +
            (activeCharacter && activeCharacter.portrait ? '<img src="' + escapeHtml(activeCharacter.portrait) + '" alt="" style="flex:none;width:38px;height:38px;border-radius:50%;object-fit:cover;border:1px solid rgba(var(--border-tint),0.35)"/>' : '') +
            '<div style="font-size:21px;font-weight:700;letter-spacing:0.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" class="font-cinzel">' + escapeHtml(p.characterName) + '</div>' +
          '</div>' +
          '<div style="display:flex;align-items:center;gap:10px;flex:none">' +
            '<div data-action="toggle-inspiration" title="Point d\'inspiration" style="flex:none;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:' + (p.inspiration ? 'var(--accent-gold-badge-text)' : 'var(--text-dim)') + ';background:' + (p.inspiration ? 'rgba(234,179,8,0.18)' : 'transparent') + ';border:1px solid ' + (p.inspiration ? 'rgba(234,179,8,0.6)' : 'rgba(var(--border-tint),0.25)') + '">' + iconStar(p.inspiration) + '</div>' +
            '<div data-action="toggle-concentration" class="' + (p.concentration ? 'concentration-active' : '') + '" title="Concentration" style="flex:none;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:' + (p.concentration ? 'var(--accent-purple-solid)' : 'var(--text-dim)') + ';background:' + (p.concentration ? 'rgba(167,139,250,0.18)' : 'transparent') + ';border:1px solid ' + (p.concentration ? 'rgba(167,139,250,0.6)' : 'rgba(var(--border-tint),0.25)') + '">' + ICON_CONCENTRATION + '</div>' +
          '</div>' +
        '</div>' +

        '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;flex:none">' + combatStatsHtml + '</div>' +

        '<div style="background:var(--bg-card);border:1px solid rgba(var(--border-tint),0.2);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:16px">' +
          '<div data-action="damage" style="flex:none;width:80px;height:76px;border-radius:6px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.45);color:#ef4444;font-size:28px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none">&minus;</div>' +
          '<div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:10px;align-items:center;text-align:center">' +
            '<div style="font-size:12px;font-weight:600;color:var(--text-label);text-transform:uppercase;letter-spacing:0.08em">Points de vie</div>' +
            '<div style="display:flex;align-items:baseline;justify-content:center;gap:6px;flex-wrap:wrap">' +
              '<div style="font-size:42px;font-weight:800;line-height:1">' + hp.current + '</div>' +
              '<div style="font-size:19px;color:var(--text-muted)">/</div>' +
              maxHtml +
              tempHtml +
            '</div>' +
            (function () {
              var currentPct = hp.max > 0 ? clamp(Math.round(hp.current / hp.max * 100), 0, 100) : 0;
              var tempPct = hp.max > 0 ? clamp(Math.round(hp.temp / hp.max * 100), 0, currentPct) : 0;
              return '<div style="width:100%;height:5px;border-radius:3px;background:rgba(239,68,68,0.35);overflow:hidden;position:relative">' +
                '<div style="height:100%;width:' + currentPct + '%;background:#22c55e"></div>' +
                (tempPct > 0 ? '<div style="position:absolute;top:0;right:' + (100 - currentPct) + '%;width:' + tempPct + '%;height:100%;background:var(--accent-blue-text)"></div>' : '') +
              '</div>';
            })() +
          '</div>' +
          '<div data-action="heal" style="flex:none;width:80px;height:76px;border-radius:6px;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.45);color:#22c55e;font-size:28px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none">+</div>' +
        '</div>' +

        '<div data-scroll-root style="flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding-right:2px;margin-top:10px">' +
          '<div style="display:flex;flex-direction:column;gap:8px">' +
            '<div style="font-size:12px;font-weight:600;color:var(--text-label);text-transform:uppercase;letter-spacing:0.08em">Emplacements de sorts</div>' +
            (spellGroupsHtml || '<div style="font-size:12px;color:var(--text-dim)">Aucun niveau actif - configurez-les dans les paramètres.</div>') +
          '</div>' +
          classHtml +
        '</div>' +

        '<div data-action="open-rest" style="flex:none;height:52px;border-radius:6px;background:var(--border-strong);border:1px solid rgba(var(--border-tint),0.34);color:var(--ink-bright);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;letter-spacing:0.03em" class="font-cinzel">Repos</div>' +
      '</div>'
    );
  }

  function renderStats() {
    var p = profile();
    var search = ui.statsSearch || '';
    var filteredSkills = p.skills.filter(function (s) {
      return s.name.toLowerCase().indexOf(search.toLowerCase()) !== -1;
    });

    var abilitiesHtml = ABILITY_KEYS.map(function (key) {
      return '<div style="position:relative;height:90px;background:var(--bg-card);border:1px solid rgba(var(--border-tint),0.2);border-radius:10px;overflow:hidden">' +
        '<div style="position:absolute;inset:0;clip-path:polygon(100% 0,100% 100%,0 100%);background:var(--bg-card-alt)"></div>' +
        '<svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0"><line x1="0" y1="100" x2="100" y2="0" style="stroke:rgba(var(--border-tint),0.4)" stroke-width="1" vector-effect="non-scaling-stroke"/></svg>' +
        '<div style="position:absolute;top:6px;left:8px;display:flex;flex-direction:column;align-items:flex-start;gap:0px">' +
          '<div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.03em">' + ABILITY_LABELS[key] + '</div>' +
          '<div style="font-size:22px;line-height:1;font-weight:700;color:var(--text-gold)" class="font-cinzel">' + formatSigned(p.abilityScores[key]) + '</div>' +
        '</div>' +
        '<div style="position:absolute;bottom:6px;right:8px;display:flex;flex-direction:column;align-items:flex-end;gap:0px">' +
          '<div style="font-size:22px;line-height:1;color:var(--text-gold)" class="font-cinzel">' + formatSigned(p.savingThrows[key]) + '</div>' +
          '<div style="font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.03em">Sauv.</div>' +
        '</div>' +
        '</div>';
    }).join('');

    var skillsHtml = filteredSkills.length
      ? filteredSkills.map(function (s, i) {
          return '<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:' + (i % 2 ? 'var(--bg-card-alt)' : 'var(--bg-card)') + ';border-bottom:1px solid rgba(var(--border-tint),0.14)">' +
            '<div style="font-size:15px;color:var(--text-main)">' + escapeHtml(s.name) + '</div>' +
            '<div style="font-size:16px;font-weight:700;color:var(--text-gold)">' + formatSigned(s.modifier) + '</div>' +
            '</div>';
        }).join('')
      : '<div style="padding:16px;text-align:center;font-size:12px;color:var(--text-dim)">Aucune compétence trouvée.</div>';

    return (
      '<div style="display:flex;flex-direction:column;height:100%;gap:14px">' +
        '<div style="font-size:21px;font-weight:700;letter-spacing:0.3px;flex:none" class="font-cinzel">Personnage</div>' +
        '<input id="statsSearchInput" type="text" value="' + escapeHtml(search) + '" placeholder="Rechercher une compétence…" style="flex:none;height:52px;background:var(--bg-card);border:1px solid rgba(var(--border-tint),0.24);border-radius:10px;color:var(--text-main);font-size:16px;padding:0 16px;box-sizing:border-box"/>' +
        '<div style="flex:none">' +
          '<div style="font-size:11px;color:var(--text-label);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Caractéristiques</div>' +
          '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">' + abilitiesHtml + '</div>' +
        '</div>' +
        '<div style="flex:1;min-height:0;display:flex;flex-direction:column;gap:8px">' +
          '<div style="font-size:11px;color:var(--text-label);text-transform:uppercase;letter-spacing:0.06em;flex:none">Compétences</div>' +
          '<div data-scroll-root style="flex:1;min-height:0;overflow-y:auto;border-radius:12px;border:1px solid rgba(var(--border-tint),0.2)">' + skillsHtml + '</div>' +
        '</div>' +
      '</div>'
    );
  }

  function maxEnabledSpellLevel() {
    var enabledLevels = profile().spellLevels.filter(function (l) { return l.enabled; }).map(function (l) { return l.level; });
    return enabledLevels.length ? Math.max.apply(null, enabledLevels) : 0;
  }

  function grimoireTabs() {
    var tabs = [];
    for (var i = 0; i <= maxEnabledSpellLevel(); i++) tabs.push(i);
    tabs.push('classe');
    return tabs;
  }

  function grimoireTabLabel(tab) {
    return tab === 'classe' ? 'Classe' : String(tab);
  }

  var GRIMOIRE_FILTERS = [
    { key: 'action', label: 'Action', prefix: 'ACTION', style: 'background:rgba(125,211,252,0.16);border:1px solid rgba(125,211,252,0.45);color:var(--accent-blue-text);' },
    { key: 'bonus', label: 'Bonus', prefix: 'BONUS', style: 'background:rgba(34,197,94,0.16);border:1px solid rgba(34,197,94,0.45);color:var(--accent-green-text);' },
    { key: 'reaction', label: 'Réaction', prefix: 'RÉACTION', style: 'background:rgba(239,68,68,0.16);border:1px solid rgba(239,68,68,0.45);color:var(--accent-red-text);' }
  ];

  function spellMatchesGrimoireFilters(spell) {
    var activeFilters = GRIMOIRE_FILTERS.filter(function (f) { return ui.grimoireFilters[f.key]; });
    if (!activeFilters.length) return true;
    var t = spell.type.toUpperCase();
    return activeFilters.some(function (f) { return t.indexOf(f.prefix) === 0; });
  }

  // Filtres de la page "Préparation de sorts" (Deneor) : Réaction n'a aucun sens pour lui (aucun
  // sort de ce type dans sa liste), remplacé par "Classe" qui révèle les capacités de classe/serment
  // sous l'onglet de niveau en cours, sans changer d'onglet.
  var PREPARE_FILTERS = [
    { key: 'action', label: 'Action', prefix: 'ACTION', style: 'background:rgba(125,211,252,0.16);border:1px solid rgba(125,211,252,0.45);color:var(--accent-blue-text);' },
    { key: 'bonus', label: 'Bonus', prefix: 'BONUS', style: 'background:rgba(34,197,94,0.16);border:1px solid rgba(34,197,94,0.45);color:var(--accent-green-text);' },
    { key: 'classe', label: 'Classe', style: 'background:rgba(var(--border-tint),0.28);border:1px solid var(--border-strong);color:var(--text-gold);' }
  ];

  function spellMatchesPrepareTypeFilters(spell) {
    var activeFilters = PREPARE_FILTERS.filter(function (f) { return f.prefix && ui.prepareFilters[f.key]; });
    if (!activeFilters.length) return true;
    var t = spell.type.toUpperCase();
    return activeFilters.some(function (f) { return t.indexOf(f.prefix) === 0; });
  }

  function renderGrimoireSection(section, spells, prepareMode) {
    var rowsHtml = spells.map(function (spell, i) {
      var alwaysAvailable = prepareMode && spell.alwaysAvailable;
      var prepared = prepareMode && !spell.alwaysAvailable && profile().preparedSpells.indexOf(spell.name) !== -1;
      var clickable = prepareMode && !spell.alwaysAvailable;
      return '<div ' + (clickable ? 'data-action="toggle-prepared-spell" data-name="' + escapeHtml(spell.name) + '"' : '') +
        ' style="padding:11px 14px;background:' + (prepared ? 'rgba(var(--border-tint),0.16)' : (i % 2 ? 'var(--bg-card-alt)' : 'var(--bg-card)')) + ';border-bottom:1px solid rgba(var(--border-tint),0.14);' + (clickable ? 'cursor:pointer;' : '') + (prepared ? 'border-left:3px solid var(--border-strong);' : '') + '">' +
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">' +

  // ---- event binding ----
  function bindEvents(searchHadFocus) {
    app.querySelectorAll('[data-action]').forEach(function (el) {
      el.addEventListener('click', onAction);
    });

    var hpMaxInput = document.getElementById('hpMaxInput');
    if (hpMaxInput) {
      hpMaxInput.focus();
      hpMaxInput.select();
      hpMaxInput.addEventListener('blur', function () {
        profile().hp.max = clamp(toInt(hpMaxInput.value, profile().hp.max), 0, 999);
        profile().hp.current = clamp(profile().hp.current, 0, profile().hp.max);
        ui.editingMax = false;
        saveState();
        render();
      });
      hpMaxInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') hpMaxInput.blur(); });
    }

    var tempInput = document.getElementById('tempInput');
    if (tempInput) {
      tempInput.focus();
      tempInput.select();
      tempInput.addEventListener('blur', function () {
        profile().hp.temp = clamp(toInt(tempInput.value, profile().hp.temp), 0, 999);
        ui.editingTemp = false;
        saveState();
        render();
      });
      tempInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') tempInput.blur(); });
    }

    var nameInput = document.getElementById('nameInput');
    if (nameInput) {
      nameInput.addEventListener('input', function () {
        profile().characterName = nameInput.value;
        saveState();
      });
    }

    app.querySelectorAll('[data-action="class-resource-label"]').forEach(function (el) {
      el.addEventListener('input', function () {
        var id = el.getAttribute('data-id');
        var cr = profile().classResources.find(function (x) { return x.id === id; });
        if (cr) { cr.label = el.value; saveState(); }
      });
    });

    app.querySelectorAll('[data-action="class-resource-max"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var id = el.getAttribute('data-id');
        var cr = profile().classResources.find(function (x) { return x.id === id; });
        if (!cr) return;
        var max = clamp(toInt(el.value, cr.max), 0, 20);
        cr.max = max;
        cr.used = resizeUsedArray(cr.used, max);
        saveState();
        render();
      });
    });

    app.querySelectorAll('[data-action="level-max"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var level = parseInt(el.getAttribute('data-level'), 10);
        var l = profile().spellLevels.find(function (x) { return x.level === level; });
        var max = clamp(toInt(el.value, l.max), 0, 12);
        l.max = max;
        l.used = resizeUsedArray(l.used, max);
        saveState();
        render();
      });
    });

    var statsSearchInput = document.getElementById('statsSearchInput');
    if (statsSearchInput) {
      if (searchHadFocus) {
        statsSearchInput.focus();
        var caret = statsSearchInput.value.length;
        statsSearchInput.setSelectionRange(caret, caret);
      }
      statsSearchInput.addEventListener('input', function () {
        ui.statsSearch = statsSearchInput.value;
        render();
      });
    }

    app.querySelectorAll('[data-action="ability-input"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var key = el.getAttribute('data-key');
        var scores = profile().abilityScores;
        scores[key] = clamp(toInt(el.value, scores[key]), -99, 99);
        saveState();
        render();
      });
    });

    app.querySelectorAll('[data-action="saving-throw-input"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var key = el.getAttribute('data-key');
        var throws = profile().savingThrows;
        throws[key] = clamp(toInt(el.value, throws[key]), -99, 99);
        saveState();
        render();
      });
    });

    app.querySelectorAll('[data-action="combat-input"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var key = el.getAttribute('data-key');
        var stats = profile().combatStats;
        var min = key === 'initiative' ? -99 : 0;
        stats[key] = clamp(toInt(el.value, stats[key]), min, 99);
        saveState();
        render();
      });
    });

    app.querySelectorAll('[data-action="skill-input"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var idx = parseInt(el.getAttribute('data-index'), 10);
        var skill = profile().skills[idx];
        skill.modifier = clamp(toInt(el.value, skill.modifier), -99, 99);
        saveState();
        render();
      });
    });

    var grimoireSwipe = document.getElementById('grimoireSwipe');
    if (grimoireSwipe) {
      var touchStartX = 0, touchStartY = 0, touchActive = false;
      grimoireSwipe.addEventListener('touchstart', function (e) {
        if (e.touches.length !== 1) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchActive = true;
      }, { passive: true });
      grimoireSwipe.addEventListener('touchend', function (e) {
        if (!touchActive) return;
        touchActive = false;
        var touch = e.changedTouches[0];
        var dx = touch.clientX - touchStartX;
        var dy = touch.clientY - touchStartY;
        if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
          grimoireStep(dx < 0 ? 1 : -1);
        }
      }, { passive: true });

      var grimoirePrepareFab = document.getElementById('grimoirePrepareFab');
      if (grimoirePrepareFab) {
        var updateFabVisibility = function () {
          var atTop = grimoireSwipe.scrollTop <= 4;
          grimoirePrepareFab.style.opacity = atTop ? '1' : '0';
          grimoirePrepareFab.style.pointerEvents = atTop ? 'auto' : 'none';
        };
        updateFabVisibility();
        grimoireSwipe.addEventListener('scroll', updateFabVisibility, { passive: true });
      }
    }

    var characterCarouselSwipe = document.getElementById('characterCarouselSwipe');
    if (characterCarouselSwipe) {
      // Glissé façon "carte à jouer" : la carte suit le pointeur (souris ou tactile) en direct
      // pendant le drag, puis part en vol (carte suivante) ou revient se recaler, dans les deux cas
      // avec une transition volontairement lente pour un effet posé plutôt qu'un simple slide de tab.
      var charDrag = null;

      characterCarouselSwipe.addEventListener('pointerdown', function (e) {
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        charDrag = { pointerId: e.pointerId, startX: e.clientX, startY: e.clientY, dx: 0, dragging: false };
      });

      characterCarouselSwipe.addEventListener('pointermove', function (e) {
        if (!charDrag || charDrag.pointerId !== e.pointerId) return;
        var dx = e.clientX - charDrag.startX;
        var dy = e.clientY - charDrag.startY;
        if (!charDrag.dragging) {
          if (Math.abs(dx) < 8) return;
          if (Math.abs(dx) < Math.abs(dy) * 1.5) { charDrag = null; return; }
          charDrag.dragging = true;
          characterCarouselSwipe.setPointerCapture(e.pointerId);
          characterCarouselSwipe.style.transition = 'none';
        }
        var idxNow = clamp(ui.characterCarouselIndex, 0, CHARACTER_ORDER.length - 1);
        var blocked = (dx > 0 && idxNow === 0) || (dx < 0 && idxNow === CHARACTER_ORDER.length - 1);
        var followDx = blocked ? dx * 0.35 : dx;
        charDrag.dx = followDx;
        var rotate = clamp(followDx / 18, -8, 8);
        characterCarouselSwipe.style.transform = 'translateX(' + followDx + 'px) rotate(' + rotate + 'deg)';
        characterCarouselSwipe.style.opacity = String(clamp(1 - Math.abs(followDx) / 340, 0.35, 1));
      });

      function endCharDrag(e) {
        if (!charDrag || charDrag.pointerId !== e.pointerId) return;
        var wasDragging = charDrag.dragging;
        var dx = charDrag.dx;
        charDrag = null;
        if (!wasDragging) return;

        var idxNow = clamp(ui.characterCarouselIndex, 0, CHARACTER_ORDER.length - 1);
        var canPrev = idxNow > 0, canNext = idxNow < CHARACTER_ORDER.length - 1;
        var threshold = 90;
        var commitDelta = 0;
        if (dx <= -threshold && canNext) commitDelta = 1;
        else if (dx >= threshold && canPrev) commitDelta = -1;

        characterCarouselSwipe.style.transition = 'transform 360ms cubic-bezier(0.22,0.61,0.36,1), opacity 360ms ease-out';

        if (commitDelta !== 0) {
          var flyX = commitDelta > 0 ? -420 : 420;
          characterCarouselSwipe.style.transform = 'translateX(' + flyX + 'px) rotate(' + (commitDelta > 0 ? -14 : 14) + 'deg)';
          characterCarouselSwipe.style.opacity = '0';
          setTimeout(function () { characterCarouselStep(commitDelta); }, 360);
        } else {
          characterCarouselSwipe.style.transform = '';
          characterCarouselSwipe.style.opacity = '';
        }
      }

      characterCarouselSwipe.addEventListener('pointerup', endCharDrag);
      characterCarouselSwipe.addEventListener('pointercancel', endCharDrag);
    }
  }

  function grimoireStep(delta) {
    var tabs = grimoireTabs();
    var idx = tabs.indexOf(ui.grimoireTab);
    if (idx === -1) idx = 0;
    var newIdx = clamp(idx + delta, 0, tabs.length - 1);
    if (newIdx === idx) return;
    ui.grimoireAnimDirection = delta > 0 ? 'next' : 'prev';
    ui.grimoireTab = tabs[newIdx];
    render();
  }

  function characterCarouselStep(delta) {
    var newIdx = clamp(ui.characterCarouselIndex + delta, 0, CHARACTER_ORDER.length - 1);
    if (newIdx === ui.characterCarouselIndex) return;
    ui.characterCarouselAnimDirection = delta > 0 ? 'next' : 'prev';
    ui.characterCarouselIndex = newIdx;
    ui.characterNotice = null;
    ui.characterImportError = null;
    render();
  }

  function exportCharacterJson(charId) {
    var character = state.characters[charId];
    if (!character) return;
    var dataStr = JSON.stringify(character.savedProfile, null, 2);
    var blob = new Blob([dataStr], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'cantrip-' + charId + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importCharacterJson(charId) {
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json,.json';
    input.style.display = 'none';
    document.body.appendChild(input);
    input.addEventListener('change', function () {
      var file = input.files && input.files[0];
      document.body.removeChild(input);
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function () {
        try {
          var parsed = JSON.parse(String(reader.result));
          if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) throw new Error('invalid');
          sanitizeProfile(parsed);
          state.characters[charId].savedProfile = parsed;
          if (state.activeCharacterId === charId) {
            state.profiles[state.activeProfileIndex] = cloneDeep(parsed);
          }
          ui.characterImportError = null;
          ui.characterNotice = { id: charId, text: 'Personnage importé.' };
          saveState();
          render();
        } catch (e) {
          ui.characterNotice = null;
          ui.characterImportError = 'Fichier JSON invalide.';
          render();
        }
      };
      reader.readAsText(file);
    });
    input.click();
  }

  function onAction(e) {
    var action = e.currentTarget.getAttribute('data-action');
    switch (action) {
      case 'nav': ui.view = e.currentTarget.getAttribute('data-view'); render(); break;

      case 'damage': applyDamage(); break;
      case 'heal': applyHeal(); break;

      case 'toggle-spell': {
        var level = parseInt(e.currentTarget.getAttribute('data-level'), 10);
        var idx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
        var l = profile().spellLevels.find(function (x) { return x.level === level; });
        l.used[idx] = !l.used[idx];
        saveState(); render();
        break;
      }
      case 'toggle-class': {
        var crId = e.currentTarget.getAttribute('data-id');
        var cidx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
        var cr = profile().classResources.find(function (x) { return x.id === crId; });
        if (cr) { cr.used[cidx] = !cr.used[cidx]; saveState(); render(); }
        break;
      }
      case 'add-class-resource': {
        profile().classResources.push(makeClassResource('Ressource de Classe', 0));
        saveState(); render();
        break;
      }
      case 'remove-class-resource': {
        var removeId = e.currentTarget.getAttribute('data-id');
        var crs = profile().classResources;
        var removeIdx = crs.findIndex(function (x) { return x.id === removeId; });
        if (removeIdx !== -1) crs.splice(removeIdx, 1);
        saveState(); render();
        break;
      }

      case 'toggle-level': {
        var lvl = parseInt(e.currentTarget.getAttribute('data-level'), 10);
        var levels = profile().spellLevels;
        var sl = levels.find(function (x) { return x.level === lvl; });
        if (!sl.enabled) {
          var lowerLevelsEnabled = levels.filter(function (x) { return x.level < lvl; }).every(function (x) { return x.enabled; });
          if (!lowerLevelsEnabled) {
            ui.settingsLevelError = 'Activez d\'abord les niveaux inférieurs.';
            render();
            break;
          }
          sl.enabled = true;
          ui.settingsLevelError = '';
          saveState(); render();
        } else {
          var higherLevelsEnabled = levels.some(function (x) { return x.level > lvl && x.enabled; });
          if (higherLevelsEnabled) {
            ui.disableLevelDialog = { level: lvl };
            render();
          } else {
            sl.enabled = false;
            saveState(); render();
          }
        }
        break;
      }
      case 'cancel-disable-level':
        ui.disableLevelDialog = null;
        render();
        break;
      case 'confirm-disable-level': {
        var disableFrom = ui.disableLevelDialog.level;
        profile().spellLevels.forEach(function (x) {
          if (x.level >= disableFrom) x.enabled = false;
        });
        ui.disableLevelDialog = null;
        saveState(); render();
        break;
      }
      case 'grimoire-tab': {
        var tabValue = e.currentTarget.getAttribute('data-tab');
        ui.grimoireTab = tabValue === 'classe' ? 'classe' : parseInt(tabValue, 10);
        render();
        break;
      }
      case 'toggle-grimoire-filter': {
        var filterKey = e.currentTarget.getAttribute('data-filter');
        ui.grimoireFilters[filterKey] = !ui.grimoireFilters[filterKey];
        render();
        break;
      }
      case 'toggle-concentration': {
        profile().concentration = !profile().concentration;
        saveState(); render();
        break;
      }
      case 'toggle-inspiration': {
        profile().inspiration = !profile().inspiration;
        saveState(); render();
        break;
      }
      case 'skill-inc': {
        var incIdx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
        var incSkill = profile().skills[incIdx];
        incSkill.modifier = clamp(incSkill.modifier + 1, -99, 99);
        saveState(); render();
        break;
      }
      case 'skill-dec': {
        var decIdx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
        var decSkill = profile().skills[decIdx];
        decSkill.modifier = clamp(decSkill.modifier - 1, -99, 99);
        saveState(); render();
        break;
      }

      case 'open-rest':
        ui.shortRestChecks = { hp: false, spells: false, tempHp: false, classResource: false };
        ui.shortRestOpen = true;
        render();
        break;
      case 'cancel-rest':
        ui.shortRestOpen = false;
        render();
        break;
      case 'toggle-rest-check': {
        var key = e.currentTarget.getAttribute('data-key');
        ui.shortRestChecks[key] = !ui.shortRestChecks[key];
        render();
        break;
      }
      case 'confirm-rest':
        confirmRest();
        break;
      case 'confirm-rest-and-prepare':
        confirmRestAndPrepare();
        break;

      case 'open-grimoire-prepare': {
        var prepareBack = e.currentTarget.getAttribute('data-back');
        ui.grimoirePrepareBackView = prepareBack || 'grimoire';
        ui.view = 'grimoire-prepare';
        render();
        break;
      }
      case 'toggle-prepared-spell': {
        var spellName = e.currentTarget.getAttribute('data-name');
        var prepared = profile().preparedSpells;
        var spellIdx = prepared.indexOf(spellName);
        if (spellIdx === -1) prepared.push(spellName); else prepared.splice(spellIdx, 1);
        saveState(); render();
        break;
      }
      case 'toggle-prepare-filter': {
        var prepareFilterKey = e.currentTarget.getAttribute('data-filter');
        ui.prepareFilters[prepareFilterKey] = !ui.prepareFilters[prepareFilterKey];
        render();
        break;
      }

      case 'character-carousel-step': {
        var carouselDelta = parseInt(e.currentTarget.getAttribute('data-delta'), 10);
        characterCarouselStep(carouselDelta);
        break;
      }
      case 'load-character': {
        var loadId = e.currentTarget.getAttribute('data-id');
        var characterToLoad = state.characters[loadId];
        state.profiles[state.activeProfileIndex] = cloneDeep(characterToLoad.savedProfile);
        state.activeCharacterId = loadId;
        applyTheme();
        ui.characterNotice = null;
        ui.characterImportError = null;
        ui.view = 'tracker';
        saveState(); render();
        break;
      }
      case 'update-character': {
        var updateId = e.currentTarget.getAttribute('data-id');
        if (state.activeCharacterId === updateId) {
          state.characters[updateId].savedProfile = cloneDeep(profile());
          ui.characterNotice = { id: updateId, text: 'Personnage mis à jour.' };
          ui.characterImportError = null;
          saveState(); render();
        }
        break;
      }
      case 'export-character': {
        exportCharacterJson(e.currentTarget.getAttribute('data-id'));
        break;
      }
      case 'import-character': {
        importCharacterJson(e.currentTarget.getAttribute('data-id'));
        break;
      }

      default: break;
    }

    if (action === 'hp-max-click') startEditMax();
  }

  // hp max / temp click-to-edit triggers via delegated ids (added after render since dynamic)
  app.addEventListener('click', function (e) {
    if (e.target && e.target.id === 'hpMaxDisplay') { ui.editingMax = true; render(); }
    if (e.target && e.target.id === 'tempDisplay') { ui.editingTemp = true; render(); }
  });

  // présélectionne le contenu de tout champ texte au focus, pour faciliter la saisie directe
  // (la recherche de compétences est exclue : c'est un filtre en direct, pas une valeur à remplacer)
  app.addEventListener('focusin', function (e) {
    if (e.target && e.target.tagName === 'INPUT' && e.target.type === 'text' && e.target.id !== 'statsSearchInput') {
      e.target.select();
    }
  });

  function startEditMax() { ui.editingMax = true; render(); }

  function applyDamage() {
    var hp = profile().hp;
    if (hp.temp > 0) {
      hp.temp -= 1;
    } else {
      hp.current = clamp(hp.current - 1, 0, hp.max);
    }
    saveState();
    render();
  }

  function applyHeal() {
    var hp = profile().hp;
    if (hp.current >= hp.max) {
      hp.temp = clamp(hp.temp + 1, 0, 999);
    } else {
      hp.current = clamp(hp.current + 1, 0, hp.max);
    }
    saveState();
    render();
  }

  function applyRestChecks() {
    var p = profile();
    var checks = ui.shortRestChecks;
    if (checks.hp) p.hp.current = p.hp.max;
    if (checks.tempHp) p.hp.temp = 0;
    if (checks.spells) {
      p.spellLevels.forEach(function (l) {
        if (l.enabled) l.used = l.used.map(function () { return false; });
      });
    }
    if (checks.classResource) {
      p.classResources.forEach(function (cr) {
        cr.used = cr.used.map(function () { return false; });
      });
    }
  }

  function confirmRest() {
    applyRestChecks();
    ui.shortRestOpen = false;
    saveState();
    render();
  }

  function confirmRestAndPrepare() {
    applyRestChecks();
    ui.shortRestOpen = false;
    ui.grimoirePrepareBackView = 'tracker';
    ui.view = 'grimoire-prepare';
    saveState();
    render();
  }

  render();

  // ---- PWA service worker (best-effort, no-op if unsupported) ----
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () { /* offline support unavailable, app still works online */ });
    });
  }
})();
</script>
</body>
</html>
