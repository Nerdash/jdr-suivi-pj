<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Suivi de Personnage</title>
<meta name="theme-color" content="#171209">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg-card: #2b2119;
    --border-card: rgba(196,164,108,0.2);
    --text-main: #efe4cf;
    --text-gold: #f0d9a8;
    --text-label: #b8a988;
    --text-muted: #a08d64;
    --text-dim: #6b5a3b;
    --border-strong: #4a3c28;
    --bg-deep: #171209;
  }
  html, body {
    height: 100%;
    margin: 0;
    background: #171209;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  body {
    font-family: -apple-system, 'SF Pro', system-ui, sans-serif;
    color: var(--text-main);
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    height: 100vh;
    height: 100dvh;
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(160deg, #211a12 0%, #171209 100%),
      repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 2px, transparent 2px, transparent 7px);
    box-sizing: border-box;
    padding: max(20px, env(safe-area-inset-top) + 14px) max(18px, env(safe-area-inset-right) + 4px) max(16px, env(safe-area-inset-bottom) + 12px) max(18px, env(safe-area-inset-left) + 4px);
    display: flex;
    flex-direction: column;
  }
  .font-cinzel { font-family: 'Cinzel', serif; }
  input::placeholder { color: #6b5a3d; }
  .hscroll { scrollbar-width: none; -ms-overflow-style: none; }
  .hscroll::-webkit-scrollbar { display: none; }
  .badge { flex: none; width: 40px; height: 40px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; user-select: none; }
  .badge-used { background: rgba(239,68,68,0.14); border: 1px solid rgba(239,68,68,0.45); color: #fca5a5; font-weight: 600; }
  .badge-available { background: rgba(34,197,94,0.16); border: 1px solid rgba(34,197,94,0.5); color: #86efac; font-weight: 700; }
  .toggle-track { width: 40px; height: 24px; border-radius: 12px; position: relative; cursor: pointer; flex: none; transition: background 150ms; }
  .toggle-knob { width: 18px; height: 18px; border-radius: 9px; background: var(--text-main); position: absolute; top: 3px; transition: left 150ms; }
  .icon-btn { width: 44px; height: 44px; border-radius: 6px; background: var(--bg-card); border: 1px solid var(--border-card); display: flex; align-items: center; justify-content: center; color: var(--text-label); cursor: pointer; flex: none; }
  input:disabled { opacity: 0.45; }
  @keyframes concentration-pulse {
    0%, 100% { box-shadow: inset 0 0 0 0 rgba(167,139,250,0); }
    50% { box-shadow: inset 0 0 10px 3px rgba(167,139,250,0.7); }
  }
  .concentration-active { animation: concentration-pulse 1.7s ease-in-out infinite; }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  'use strict';

  var STORAGE_KEY = 'jdr_character_tracker_state';

  function makeSpellLevels() {
    var levels = [];
    for (var i = 1; i <= 9; i++) {
      levels.push({ level: i, enabled: false, max: 0, used: [] });
    }
    return levels;
  }

  var ABILITY_KEYS = ['force', 'dexterite', 'constitution', 'intelligence', 'sagesse', 'charisme'];
  var ABILITY_LABELS = { force: 'Force', dexterite: 'Dextérité', constitution: 'Constitution', intelligence: 'Intelligence', sagesse: 'Sagesse', charisme: 'Charisme' };
  var SKILL_NAMES = ['Acrobaties', 'Arcanes', 'Athlétisme', 'Discrétion', 'Dressage', 'Escamotage', 'Histoire', 'Intimidation', 'Intuition', 'Investigation', 'Médecine', 'Nature', 'Perception', 'Persuasion', 'Religion', 'Représentation', 'Survie', 'Tromperie'];

  function makeAbilityScores() {
    var scores = {};
    ABILITY_KEYS.forEach(function (k) { scores[k] = 0; });
    return scores;
  }

  function makeSkills() {
    return SKILL_NAMES.map(function (name) { return { name: name, modifier: 0 }; });
  }

  function defaultProfile() {
    return {
      characterName: 'Mon Personnage',
      hp: { current: 10, max: 10, temp: 0 },
      spellLevels: makeSpellLevels(),
      classResource: { enabled: false, label: 'Ressource de Classe', max: 0, used: [] },
      concentration: false,
      abilityScores: makeAbilityScores(),
      skills: makeSkills()
    };
  }

  function sanitizeProfile(p) {
    if (!p.abilityScores || typeof p.abilityScores !== 'object') p.abilityScores = makeAbilityScores();
    ABILITY_KEYS.forEach(function (k) {
      if (typeof p.abilityScores[k] !== 'number' || isNaN(p.abilityScores[k])) p.abilityScores[k] = 0;
    });
    if (!Array.isArray(p.skills) || p.skills.length !== SKILL_NAMES.length) {
      p.skills = makeSkills();
    } else {
      p.skills.forEach(function (s, i) {
        if (typeof s.modifier !== 'number' || isNaN(s.modifier)) s.modifier = 0;
        if (typeof s.name !== 'string') s.name = SKILL_NAMES[i];
      });
    }
    return p;
  }

  function defaultState() {
    return { version: 1, activeProfileIndex: 0, profiles: [defaultProfile()] };
  }

  // ---- persistence ----
  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      var parsed = JSON.parse(raw);
      if (!parsed || !Array.isArray(parsed.profiles) || !parsed.profiles.length) return defaultState();
      parsed.profiles.forEach(sanitizeProfile);
      return parsed;
    } catch (e) {
      return defaultState();
    }
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) { /* localStorage unavailable or full: state stays in memory only */ }
  }

  var state = loadState();

  // ---- ephemeral UI state (not persisted) ----
  var ui = {
    view: 'tracker', // 'tracker' | 'stats' | 'grimoire' | 'settings'
    editingMax: false,
    editingTemp: false,
    shortRestOpen: false,
    shortRestChecks: { hp: false, spells: false, tempHp: false, classResource: false },
    importError: '',
    statsSearch: ''
  };

  function profile() { return state.profiles[state.activeProfileIndex]; }

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function toInt(v, fallback) {
    var n = parseInt(String(v).replace(/[^0-9-]/g, ''), 10);
    return isNaN(n) ? fallback : n;
  }
  function formatSigned(v) {
    return (v >= 0 ? '+' : '') + v;
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function resizeUsedArray(arr, max) {
    var out = [];
    for (var i = 0; i < max; i++) out.push(!!(arr && arr[i]));
    return out;
  }

  // ---- SVG icons ----
  var ICON_GEAR = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>';
  var ICON_CHECK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#171209" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  var ICON_CONCENTRATION = '<svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.6"/><rect x="7.5" y="7.5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="10.7" y="10.7" width="2.6" height="2.6" fill="currentColor"/></svg>';
  var ICON_TRACKER = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7.5-4.6-10-9.3C.5 8 2 4.5 5.6 4c2-.3 3.7.7 4.9 2.3C11.7 4.7 13.4 3.7 15.4 4 19 4.5 20.5 8 19 11.7 16.5 16.4 12 21 12 21z"/></svg>';
  var ICON_STATS = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M11 20V4M18 20v-7"/></svg>';
  var ICON_BOOK = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/></svg>';
  function iconResized(svg, size) {
    return svg.replace(/width="\d+"/, 'width="' + size + '"').replace(/height="\d+"/, 'height="' + size + '"');
  }

  // ---- render ----
  var app = document.getElementById('app');

  var PAGES = [
    { view: 'tracker', label: 'Tracker', icon: ICON_TRACKER },
    { view: 'stats', label: 'Stats', icon: ICON_STATS },
    { view: 'grimoire', label: 'Grimoire', icon: ICON_BOOK },
    { view: 'settings', label: 'Paramètres', icon: ICON_GEAR }
  ];

  function renderPage() {
    switch (ui.view) {
      case 'stats': return renderStats();
      case 'grimoire': return renderGrimoire();
      case 'settings': return renderSettings();
      default: return renderTracker();
    }
  }

  function renderBottomNav() {
    var itemsHtml = PAGES.map(function (page) {
      var active = ui.view === page.view;
      return '<div data-action="nav" data-view="' + page.view + '" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 0;cursor:pointer;color:' + (active ? '#f0d9a8' : '#6b5a3b') + '">' +
        page.icon +
        '<div style="font-size:10px;font-weight:600;letter-spacing:0.02em">' + page.label + '</div>' +
        '</div>';
    }).join('');
    return '<div style="flex:none;display:flex;align-items:stretch;border-top:1px solid rgba(196,164,108,0.2);background:#1c160e;border-radius:12px;overflow:hidden;margin-top:4px">' + itemsHtml + '</div>';
  }

  function render() {
    document.title = 'Suivi — ' + (profile().characterName || 'Personnage');
    var prevScroller = app.querySelector('[data-scroll-root]');
    var scrollTop = prevScroller ? prevScroller.scrollTop : 0;
    app.innerHTML =
      '<div style="display:flex;flex-direction:column;height:100%">' +
        '<div style="flex:1;min-height:0;display:flex;flex-direction:column">' + renderPage() + '</div>' +
        renderBottomNav() +
      '</div>';
    if (ui.shortRestOpen) {
      app.insertAdjacentHTML('beforeend', renderShortRestModal());
    }
    var nextScroller = app.querySelector('[data-scroll-root]');
    if (nextScroller) nextScroller.scrollTop = scrollTop;
    bindEvents();
  }

  function renderTracker() {
    var p = profile();
    var hp = p.hp;

    var maxHtml = ui.editingMax
      ? '<input id="hpMaxInput" type="text" inputmode="numeric" pattern="[0-9]*" value="' + hp.max + '" style="width:60px;font-size:19px;color:#efe4cf;background:transparent;border:none;border-bottom:1px solid #ef4444;outline:none;padding:0"/>'
      : '<div id="hpMaxDisplay" style="font-size:19px;color:#a08d64;cursor:pointer;border-bottom:1px dashed #4a3c28">' + hp.max + '</div>';

    var tempHtml;
    if (ui.editingTemp) {
      tempHtml = '<div style="display:flex;align-items:baseline;gap:2px;margin-left:8px">' +
        '<div style="font-size:19px;font-weight:700;color:#7dd3fc">+</div>' +
        '<input id="tempInput" type="text" inputmode="numeric" pattern="[0-9]*" value="' + hp.temp + '" style="width:44px;font-size:19px;font-weight:700;color:#7dd3fc;background:transparent;border:none;border-bottom:1px solid #7dd3fc;outline:none;padding:0"/></div>';
    } else {
      tempHtml = '<div id="tempDisplay" style="font-size:19px;font-weight:700;color:#7dd3fc;cursor:pointer;border-bottom:1px dashed rgba(125,211,252,0.5);margin-left:8px">+' + hp.temp + '</div>';
    }

    var spellGroupsHtml = p.spellLevels
      .filter(function (l) { return l.enabled && l.max > 0; })
      .map(function (l) {
        var badges = l.used.map(function (used, i) {
          return '<div class="badge ' + (used ? 'badge-used' : 'badge-available') + '" data-action="toggle-spell" data-level="' + l.level + '" data-index="' + i + '">' + l.level + '</div>';
        }).join('');
        return '<div style="display:flex;flex-direction:column;gap:4px">' +
          '<div style="font-size:11px;color:#a08d64;font-weight:600">Niveau ' + l.level + '</div>' +
          '<div class="hscroll" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:2px">' + badges + '</div>' +
          '</div>';
      }).join('');

    var classHtml = '';
    if (p.classResource.enabled) {
      var cbadges = p.classResource.used.map(function (used, i) {
        return '<div class="badge ' + (used ? 'badge-used' : 'badge-available') + '" data-action="toggle-class" data-index="' + i + '">' + (i + 1) + '</div>';
      }).join('');
      classHtml = '<div style="display:flex;flex-direction:column;gap:6px">' +
        '<div style="font-size:12px;font-weight:600;color:#b8a988;text-transform:uppercase;letter-spacing:0.08em">' + escapeHtml(p.classResource.label || 'Ressource') + '</div>' +
        '<div class="hscroll" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:2px">' + cbadges + '</div>' +
        '</div>';
    }

    return (
      '<div style="display:flex;flex-direction:column;height:100%;gap:14px">' +
        '<div style="font-size:21px;font-weight:700;letter-spacing:0.3px" class="font-cinzel">' + escapeHtml(p.characterName) + '</div>' +

        '<div style="background:#2b2119;border:1px solid rgba(196,164,108,0.2);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:16px">' +
          '<div data-action="damage" style="flex:none;width:80px;height:76px;border-radius:6px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.45);color:#ef4444;font-size:28px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none">&minus;</div>' +
          '<div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:10px;align-items:center;text-align:center">' +
            '<div style="font-size:12px;font-weight:600;color:#b8a988;text-transform:uppercase;letter-spacing:0.08em">Points de vie</div>' +
            '<div style="display:flex;align-items:baseline;justify-content:center;gap:6px;flex-wrap:wrap">' +
              '<div style="font-size:42px;font-weight:800;line-height:1">' + hp.current + '</div>' +
              '<div style="font-size:19px;color:#a08d64">/</div>' +
              maxHtml +
              tempHtml +
            '</div>' +
            (function () {
              var currentPct = hp.max > 0 ? clamp(Math.round(hp.current / hp.max * 100), 0, 100) : 0;
              var tempPct = hp.max > 0 ? clamp(Math.round(hp.temp / hp.max * 100), 0, currentPct) : 0;
              return '<div style="width:100%;height:5px;border-radius:3px;background:rgba(239,68,68,0.35);overflow:hidden;position:relative">' +
                '<div style="height:100%;width:' + currentPct + '%;background:#22c55e"></div>' +
                (tempPct > 0 ? '<div style="position:absolute;top:0;right:' + (100 - currentPct) + '%;width:' + tempPct + '%;height:100%;background:#7dd3fc"></div>' : '') +
              '</div>';
            })() +
          '</div>' +
          '<div data-action="heal" style="flex:none;width:80px;height:76px;border-radius:6px;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.45);color:#22c55e;font-size:28px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none">+</div>' +
        '</div>' +

        '<div data-scroll-root style="flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding-right:2px;margin-top:10px">' +
          '<div style="display:flex;flex-direction:column;gap:8px">' +
            '<div style="display:flex;align-items:center;justify-content:space-between">' +
              '<div style="font-size:12px;font-weight:600;color:#b8a988;text-transform:uppercase;letter-spacing:0.08em">Emplacements de sorts</div>' +
              '<div data-action="toggle-concentration" class="' + (p.concentration ? 'concentration-active' : '') + '" title="Concentration" style="flex:none;width:44px;height:44px;margin-right:14px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:' + (p.concentration ? '#a78bfa' : '#6b5a3b') + ';background:' + (p.concentration ? 'rgba(167,139,250,0.18)' : 'transparent') + ';border:1px solid ' + (p.concentration ? 'rgba(167,139,250,0.6)' : 'rgba(196,164,108,0.25)') + '">' + ICON_CONCENTRATION + '</div>' +
            '</div>' +
            (spellGroupsHtml || '<div style="font-size:12px;color:#6b5a3b">Aucun niveau actif - configurez-les dans les paramètres.</div>') +
          '</div>' +
          classHtml +
        '</div>' +

        '<div data-action="open-rest" style="flex:none;height:52px;border-radius:6px;background:#4a3c28;border:1px solid rgba(196,164,108,0.34);color:#efe4cf;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;letter-spacing:0.03em" class="font-cinzel">Repos</div>' +
      '</div>'
    );
  }

  function renderStats() {
    var p = profile();
    var search = ui.statsSearch || '';
    var filteredSkills = p.skills.filter(function (s) {
      return s.name.toLowerCase().indexOf(search.toLowerCase()) !== -1;
    });

    var abilitiesHtml = ABILITY_KEYS.map(function (key) {
      return '<div style="display:flex;flex-direction:column;align-items:center;gap:4px;background:#2b2119;border:1px solid rgba(196,164,108,0.2);border-radius:10px;padding:10px 6px">' +
        '<div style="font-size:10px;color:#a08d64;text-transform:uppercase;letter-spacing:0.04em">' + ABILITY_LABELS[key] + '</div>' +
        '<div style="font-size:19px;font-weight:700;color:#f0d9a8" class="font-cinzel">' + formatSigned(p.abilityScores[key]) + '</div>' +
        '</div>';
    }).join('');

    var skillsHtml = filteredSkills.length
      ? filteredSkills.map(function (s, i) {
          return '<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:' + (i % 2 ? '#241a10' : '#2b2119') + ';border-bottom:1px solid rgba(196,164,108,0.14)">' +
            '<div style="font-size:15px;color:#efe4cf">' + escapeHtml(s.name) + '</div>' +
            '<div style="font-size:16px;font-weight:700;color:#f0d9a8">' + formatSigned(s.modifier) + '</div>' +
            '</div>';
        }).join('')
      : '<div style="padding:16px;text-align:center;font-size:12px;color:#6b5a3b">Aucune compétence trouvée.</div>';

    return (
      '<div style="display:flex;flex-direction:column;height:100%;gap:14px">' +
        '<div style="font-size:21px;font-weight:700;letter-spacing:0.3px;flex:none" class="font-cinzel">Stats</div>' +
        '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;flex:none">' + abilitiesHtml + '</div>' +
        '<input id="statsSearchInput" type="text" value="' + escapeHtml(search) + '" placeholder="Rechercher une compétence…" style="flex:none;height:52px;background:#2b2119;border:1px solid rgba(196,164,108,0.24);border-radius:10px;color:#efe4cf;font-size:16px;padding:0 16px;box-sizing:border-box"/>' +
        '<div data-scroll-root style="flex:1;min-height:0;overflow-y:auto;border-radius:12px;border:1px solid rgba(196,164,108,0.2)">' + skillsHtml + '</div>' +
      '</div>'
    );
  }

  function renderGrimoire() {
    return (
      '<div style="display:flex;flex-direction:column;height:100%;gap:14px">' +
        '<div style="font-size:21px;font-weight:700;letter-spacing:0.3px;flex:none" class="font-cinzel">Grimoire</div>' +
        '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#6b5a3b;text-align:center">' +
          '<div style="color:#4a3c28">' + iconResized(ICON_BOOK, 40) + '</div>' +
          '<div style="font-size:15px;font-weight:600;color:#a08d64" class="font-cinzel">Work in progress</div>' +
          '<div style="font-size:12px;color:#6b5a3b;max-width:220px">La gestion des sorts arrivera dans une prochaine mise à jour.</div>' +
        '</div>' +
      '</div>'
    );
  }

  function toggleTrackStyle(enabled) {
    return 'background:' + (enabled ? '#ef4444' : '#4a3c28') + ';';
  }
  function toggleKnobStyle(enabled) {
    return 'left:' + (enabled ? '19px' : '3px') + ';';
  }

  function renderSettings() {
    var p = profile();

    var levelRows = p.spellLevels.map(function (l) {
      return '<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:#2b2119;border-bottom:1px solid rgba(196,164,108,0.14)">' +
        '<div style="width:56px;font-size:13px;font-weight:600;color:#efe4cf">Niv. ' + l.level + '</div>' +
        '<div class="toggle-track" style="' + toggleTrackStyle(l.enabled) + '" data-action="toggle-level" data-level="' + l.level + '"><div class="toggle-knob" style="' + toggleKnobStyle(l.enabled) + '"></div></div>' +
        '<div style="flex:1"></div>' +
        '<label style="font-size:11px;color:#a08d64">Max</label>' +
        '<input type="text" inputmode="numeric" pattern="[0-9]*" value="' + l.max + '" ' + (l.enabled ? '' : 'disabled') + ' data-action="level-max" data-level="' + l.level + '" style="width:42px;height:34px;background:#171209;border:1px solid rgba(196,164,108,0.24);border-radius:8px;color:#efe4cf;font-size:13px;text-align:center;box-sizing:border-box"/>' +
        '</div>';
    }).join('');

    return (
      '<div data-scroll-root style="display:flex;flex-direction:column;height:100%;gap:14px;overflow-y:auto">' +
        '<div style="font-size:21px;font-weight:700;letter-spacing:0.3px;flex:none" class="font-cinzel">Paramètres</div>' +

        '<div style="display:flex;flex-direction:column;gap:6px;flex:none">' +
          '<label style="font-size:11px;color:#b8a988;text-transform:uppercase;letter-spacing:0.06em">Nom du personnage</label>' +
          '<input type="text" id="nameInput" value="' + escapeHtml(p.characterName) + '" style="height:44px;background:#2b2119;border:1px solid rgba(196,164,108,0.24);border-radius:10px;color:#efe4cf;font-size:15px;padding:0 12px;box-sizing:border-box"/>' +
        '</div>' +

        '<div style="display:flex;flex-direction:column;gap:6px;flex:none">' +
          '<label style="font-size:11px;color:#b8a988;text-transform:uppercase;letter-spacing:0.06em">Emplacements de sorts</label>' +
          '<div style="display:flex;flex-direction:column;border-radius:12px;overflow:hidden;border:1px solid rgba(196,164,108,0.2)">' + levelRows + '</div>' +
        '</div>' +

        '<div style="display:flex;flex-direction:column;gap:6px;flex:none">' +
          '<label style="font-size:11px;color:#b8a988;text-transform:uppercase;letter-spacing:0.06em">Ressource de classe</label>' +
          '<div style="display:flex;flex-direction:column;gap:10px;padding:12px;background:#2b2119;border-radius:12px;border:1px solid rgba(196,164,108,0.2)">' +
            '<div style="display:flex;align-items:center;justify-content:space-between">' +
              '<div style="font-size:13px;font-weight:600">Activer</div>' +
              '<div class="toggle-track" style="' + toggleTrackStyle(p.classResource.enabled) + '" data-action="toggle-class-enabled"><div class="toggle-knob" style="' + toggleKnobStyle(p.classResource.enabled) + '"></div></div>' +
            '</div>' +
            '<div style="display:flex;gap:10px">' +
              '<input type="text" id="classLabelInput" value="' + escapeHtml(p.classResource.label) + '" ' + (p.classResource.enabled ? '' : 'disabled') + ' placeholder="Libellé (ex. Ki)" style="flex:1;height:40px;background:#171209;border:1px solid rgba(196,164,108,0.24);border-radius:8px;color:#efe4cf;font-size:13px;padding:0 10px;box-sizing:border-box"/>' +
              '<input type="text" inputmode="numeric" pattern="[0-9]*" id="classMaxInput" value="' + p.classResource.max + '" ' + (p.classResource.enabled ? '' : 'disabled') + ' style="width:52px;height:40px;background:#171209;border:1px solid rgba(196,164,108,0.24);border-radius:8px;color:#efe4cf;font-size:13px;text-align:center;box-sizing:border-box"/>' +
            '</div>' +
          '</div>' +
        '</div>' +

        '<div style="display:flex;flex-direction:column;gap:6px;flex:none">' +
          '<label style="font-size:11px;color:#b8a988;text-transform:uppercase;letter-spacing:0.06em">Caractéristiques</label>' +
          '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px;background:#2b2119;border-radius:12px;border:1px solid rgba(196,164,108,0.2)">' +
            ABILITY_KEYS.map(function (key) {
              return '<div style="display:flex;flex-direction:column;gap:4px;min-width:0">' +
                '<label style="font-size:11px;color:#a08d64;text-align:center">' + ABILITY_LABELS[key] + '</label>' +
                '<input type="text" inputmode="text" pattern="-?[0-9]*" data-action="ability-input" data-key="' + key + '" value="' + formatSigned(p.abilityScores[key]) + '" style="width:100%;height:44px;background:#171209;border:1px solid rgba(196,164,108,0.24);border-radius:8px;color:#efe4cf;font-size:15px;text-align:center;box-sizing:border-box"/>' +
                '</div>';
            }).join('') +
          '</div>' +
        '</div>' +

        '<div style="display:flex;flex-direction:column;gap:6px;flex:none">' +
          '<label style="font-size:11px;color:#b8a988;text-transform:uppercase;letter-spacing:0.06em">Compétences</label>' +
          '<div style="display:flex;flex-direction:column;border-radius:12px;overflow:hidden;border:1px solid rgba(196,164,108,0.2)">' +
            p.skills.map(function (s, idx) {
              return '<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:#2b2119;border-bottom:1px solid rgba(196,164,108,0.14)">' +
                '<div style="flex:1;font-size:13px;font-weight:600;color:#efe4cf">' + escapeHtml(s.name) + '</div>' +
                '<div data-action="skill-dec" data-index="' + idx + '" style="flex:none;width:36px;height:36px;border-radius:8px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);color:#ef4444;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none">&minus;</div>' +
                '<input type="text" inputmode="text" pattern="-?[0-9]*" data-action="skill-input" data-index="' + idx + '" value="' + formatSigned(s.modifier) + '" style="width:44px;height:36px;background:#171209;border:1px solid rgba(196,164,108,0.24);border-radius:8px;color:#efe4cf;font-size:13px;text-align:center;box-sizing:border-box"/>' +
                '<div data-action="skill-inc" data-index="' + idx + '" style="flex:none;width:36px;height:36px;border-radius:8px;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.4);color:#22c55e;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none">+</div>' +
                '</div>';
            }).join('') +
          '</div>' +
        '</div>' +

        '<div style="display:flex;gap:10px;margin-top:2px;flex:none">' +
          '<div data-action="export-json" style="flex:1;height:46px;border-radius:6px;background:#2b2119;border:1px solid rgba(196,164,108,0.24);color:#efe4cf;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center">Exporter (JSON)</div>' +
          '<label style="flex:1;height:46px;border-radius:6px;background:#2b2119;border:1px solid rgba(196,164,108,0.24);color:#efe4cf;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer">' +
            'Importer (JSON)' +
            '<input type="file" accept="application/json" id="importInput" style="display:none"/>' +
          '</label>' +
        '</div>' +
        (ui.importError ? '<div style="flex:none;font-size:12px;color:#ef4444;text-align:center">' + escapeHtml(ui.importError) + '</div>' : '') +
      '</div>'
    );
  }

  function renderShortRestModal() {
    var p = profile();
    var checks = ui.shortRestChecks;
    var rows = [
      { key: 'hp', label: 'Total de PV' },
      { key: 'spells', label: 'Emplacements de sorts' },
      { key: 'tempHp', label: 'PV temporaires' },
      { key: 'classResource', label: p.classResource.label || 'Ressource de classe' }
    ];
    var rowsHtml = rows.map(function (r) {
      var checked = !!checks[r.key];
      return '<div data-action="toggle-rest-check" data-key="' + r.key + '" style="display:flex;align-items:center;gap:10px;height:40px;cursor:pointer">' +
        '<div style="width:22px;height:22px;border-radius:6px;flex:none;display:flex;align-items:center;justify-content:center;background:' + (checked ? '#efe4cf' : 'transparent') + ';border:1px solid ' + (checked ? '#efe4cf' : 'rgba(255,255,255,0.25)') + '">' + (checked ? ICON_CHECK : '') + '</div>' +
        '<div style="font-size:13px">' + escapeHtml(r.label) + '</div>' +
        '</div>';
    }).join('');

    return '<div id="restOverlay" style="position:absolute;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;box-sizing:border-box">' +
      '<div style="width:100%;max-width:300px;background:#2b2119;border:1px solid rgba(196,164,108,0.3);border-radius:16px;padding:18px;display:flex;flex-direction:column;gap:12px">' +
        '<div style="font-size:17px;font-weight:700;color:#f0d9a8" class="font-cinzel">Repos</div>' +
        rowsHtml +
        '<div style="display:flex;gap:10px;margin-top:4px">' +
          '<div data-action="cancel-rest" style="flex:1;height:44px;border-radius:6px;background:transparent;border:1px solid rgba(196,164,108,0.34);color:#b8a988;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center">Annuler</div>' +
          '<div data-action="confirm-rest" style="flex:1;height:44px;border-radius:6px;background:#efe4cf;border:none;color:#171209;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center">Valider</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  // ---- event binding ----
  function bindEvents() {
    app.querySelectorAll('[data-action]').forEach(function (el) {
      el.addEventListener('click', onAction);
    });

    var hpMaxInput = document.getElementById('hpMaxInput');
    if (hpMaxInput) {
      hpMaxInput.focus();
      hpMaxInput.select();
      hpMaxInput.addEventListener('blur', function () {
        profile().hp.max = clamp(toInt(hpMaxInput.value, profile().hp.max), 0, 999);
        profile().hp.current = clamp(profile().hp.current, 0, profile().hp.max);
        ui.editingMax = false;
        saveState();
        render();
      });
      hpMaxInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') hpMaxInput.blur(); });
    }

    var tempInput = document.getElementById('tempInput');
    if (tempInput) {
      tempInput.focus();
      tempInput.select();
      tempInput.addEventListener('blur', function () {
        profile().hp.temp = clamp(toInt(tempInput.value, profile().hp.temp), 0, 999);
        ui.editingTemp = false;
        saveState();
        render();
      });
      tempInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') tempInput.blur(); });
    }

    var nameInput = document.getElementById('nameInput');
    if (nameInput) {
      nameInput.addEventListener('input', function () {
        profile().characterName = nameInput.value;
        saveState();
      });
    }

    var classLabelInput = document.getElementById('classLabelInput');
    if (classLabelInput) {
      classLabelInput.addEventListener('input', function () {
        profile().classResource.label = classLabelInput.value;
        saveState();
      });
    }

    var classMaxInput = document.getElementById('classMaxInput');
    if (classMaxInput) {
      classMaxInput.addEventListener('change', function () {
        var cr = profile().classResource;
        var max = clamp(toInt(classMaxInput.value, cr.max), 0, 20);
        cr.max = max;
        cr.used = resizeUsedArray(cr.used, max);
        saveState();
        render();
      });
    }

    app.querySelectorAll('[data-action="level-max"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var level = parseInt(el.getAttribute('data-level'), 10);
        var l = profile().spellLevels.find(function (x) { return x.level === level; });
        var max = clamp(toInt(el.value, l.max), 0, 12);
        l.max = max;
        l.used = resizeUsedArray(l.used, max);
        saveState();
        render();
      });
    });

    var importInput = document.getElementById('importInput');
    if (importInput) {
      importInput.addEventListener('change', onImportFile);
    }

    var statsSearchInput = document.getElementById('statsSearchInput');
    if (statsSearchInput) {
      statsSearchInput.focus();
      var caret = statsSearchInput.value.length;
      statsSearchInput.setSelectionRange(caret, caret);
      statsSearchInput.addEventListener('input', function () {
        ui.statsSearch = statsSearchInput.value;
        render();
      });
    }

    app.querySelectorAll('[data-action="ability-input"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var key = el.getAttribute('data-key');
        var scores = profile().abilityScores;
        scores[key] = clamp(toInt(el.value, scores[key]), -99, 99);
        saveState();
        render();
      });
    });

    app.querySelectorAll('[data-action="skill-input"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var idx = parseInt(el.getAttribute('data-index'), 10);
        var skill = profile().skills[idx];
        skill.modifier = clamp(toInt(el.value, skill.modifier), -99, 99);
        saveState();
        render();
      });
    });
  }

  function onAction(e) {
    var action = e.currentTarget.getAttribute('data-action');
    switch (action) {
      case 'nav': ui.view = e.currentTarget.getAttribute('data-view'); render(); break;

      case 'damage': applyDamage(); break;
      case 'heal': applyHeal(); break;

      case 'toggle-spell': {
        var level = parseInt(e.currentTarget.getAttribute('data-level'), 10);
        var idx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
        var l = profile().spellLevels.find(function (x) { return x.level === level; });
        l.used[idx] = !l.used[idx];
        saveState(); render();
        break;
      }
      case 'toggle-class': {
        var cidx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
        var cr = profile().classResource;
        cr.used[cidx] = !cr.used[cidx];
        saveState(); render();
        break;
      }

      case 'toggle-level': {
        var lvl = parseInt(e.currentTarget.getAttribute('data-level'), 10);
        var sl = profile().spellLevels.find(function (x) { return x.level === lvl; });
        sl.enabled = !sl.enabled;
        saveState(); render();
        break;
      }
      case 'toggle-class-enabled': {
        profile().classResource.enabled = !profile().classResource.enabled;
        saveState(); render();
        break;
      }
      case 'toggle-concentration': {
        profile().concentration = !profile().concentration;
        saveState(); render();
        break;
      }
      case 'skill-inc': {
        var incIdx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
        var incSkill = profile().skills[incIdx];
        incSkill.modifier = clamp(incSkill.modifier + 1, -99, 99);
        saveState(); render();
        break;
      }
      case 'skill-dec': {
        var decIdx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
        var decSkill = profile().skills[decIdx];
        decSkill.modifier = clamp(decSkill.modifier - 1, -99, 99);
        saveState(); render();
        break;
      }

      case 'open-rest':
        ui.shortRestChecks = { hp: false, spells: false, tempHp: false, classResource: false };
        ui.shortRestOpen = true;
        render();
        break;
      case 'cancel-rest':
        ui.shortRestOpen = false;
        render();
        break;
      case 'toggle-rest-check': {
        var key = e.currentTarget.getAttribute('data-key');
        ui.shortRestChecks[key] = !ui.shortRestChecks[key];
        render();
        break;
      }
      case 'confirm-rest':
        confirmRest();
        break;

      case 'export-json': exportJson(); break;

      default: break;
    }

    if (action === 'hp-max-click') startEditMax();
  }

  // hp max / temp click-to-edit triggers via delegated ids (added after render since dynamic)
  app.addEventListener('click', function (e) {
    if (e.target && e.target.id === 'hpMaxDisplay') { ui.editingMax = true; render(); }
    if (e.target && e.target.id === 'tempDisplay') { ui.editingTemp = true; render(); }
  });

  function startEditMax() { ui.editingMax = true; render(); }

  function applyDamage() {
    var hp = profile().hp;
    if (hp.temp > 0) {
      hp.temp -= 1;
    } else {
      hp.current = clamp(hp.current - 1, 0, hp.max);
    }
    saveState();
    render();
  }

  function applyHeal() {
    var hp = profile().hp;
    if (hp.current >= hp.max) {
      hp.temp = clamp(hp.temp + 1, 0, 999);
    } else {
      hp.current = clamp(hp.current + 1, 0, hp.max);
    }
    saveState();
    render();
  }

  function confirmRest() {
    var p = profile();
    var checks = ui.shortRestChecks;
    if (checks.hp) p.hp.current = p.hp.max;
    if (checks.tempHp) p.hp.temp = 0;
    if (checks.spells) {
      p.spellLevels.forEach(function (l) {
        if (l.enabled) l.used = l.used.map(function () { return false; });
      });
    }
    if (checks.classResource && p.classResource.enabled) {
      p.classResource.used = p.classResource.used.map(function () { return false; });
    }
    ui.shortRestOpen = false;
    saveState();
    render();
  }

  function exportJson() {
    var p = profile();
    var today = new Date().toISOString().slice(0, 10);
    var blob = new Blob([JSON.stringify(p, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'jdr_save_' + today + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function isValidProfile(data) {
    if (!data || typeof data !== 'object') return false;
    if (typeof data.characterName !== 'string') return false;
    if (!data.hp || typeof data.hp.current !== 'number' || typeof data.hp.max !== 'number' || typeof data.hp.temp !== 'number') return false;
    if (!Array.isArray(data.spellLevels) || data.spellLevels.length !== 9) return false;
    for (var i = 0; i < data.spellLevels.length; i++) {
      var l = data.spellLevels[i];
      if (typeof l.level !== 'number' || typeof l.enabled !== 'boolean' || typeof l.max !== 'number' || !Array.isArray(l.used)) return false;
    }
    if (!data.classResource || typeof data.classResource.enabled !== 'boolean' || typeof data.classResource.max !== 'number' || !Array.isArray(data.classResource.used)) return false;
    if (data.abilityScores !== undefined) {
      if (typeof data.abilityScores !== 'object' || !data.abilityScores) return false;
      for (var a = 0; a < ABILITY_KEYS.length; a++) {
        if (typeof data.abilityScores[ABILITY_KEYS[a]] !== 'number') return false;
      }
    }
    if (data.skills !== undefined) {
      if (!Array.isArray(data.skills) || data.skills.length !== SKILL_NAMES.length) return false;
      for (var s = 0; s < data.skills.length; s++) {
        if (typeof data.skills[s].name !== 'string' || typeof data.skills[s].modifier !== 'number') return false;
      }
    }
    return true;
  }

  function onImportFile(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var data = JSON.parse(String(reader.result));
        if (!isValidProfile(data)) throw new Error('invalid');
        state.profiles[state.activeProfileIndex] = sanitizeProfile(data);
        ui.importError = '';
        saveState();
        render();
      } catch (err) {
        ui.importError = 'Fichier invalide';
        render();
      }
    };
    reader.onerror = function () {
      ui.importError = 'Fichier invalide';
      render();
    };
    reader.readAsText(file);
  }

  render();

  // ---- PWA service worker (best-effort, no-op if unsupported) ----
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () { /* offline support unavailable, app still works online */ });
    });
  }
})();
</script>
</body>
