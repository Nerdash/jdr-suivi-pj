<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Suivi de Personnage</title>
<meta name="theme-color" content="#171209">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg-gradient-1: #211a12;
    --bg-gradient-2: #171209;
    --bg-deep: #171209;
    --bg-card: #2b2119;
    --bg-card-alt: #241a10;
    --bg-nav: #1c160e;
    --border-strong: #4a3c28;
    --border-tint: 196,164,108;
    --border-card: rgba(var(--border-tint), 0.2);
    --text-main: #efe4cf;
    --text-gold: #f0d9a8;
    --text-label: #b8a988;
    --text-muted: #a08d64;
    --text-dim: #6b5a3b;
    --text-desc: #c9bb9c;
    --text-note: #8a7a54;
    --text-chip: #c9b382;
    --accent-red-text: #fca5a5;
    --accent-green-text: #86efac;
    --accent-blue-text: #7dd3fc;
    --accent-purple-text: #c4b5fd;
    --accent-purple-solid: #a78bfa;
    --accent-gray-text: #cbd5e1;
    --accent-gold-badge-text: #e0c890;
    --bg-texture: rgba(255,255,255,0.012);
    --checkbox-border-idle: rgba(255,255,255,0.25);
    --ink-bright: #efe4cf;
    --ink-dark: #171209;
  }
  :root[data-theme="light"] {
    --bg-gradient-1: #f6ecd2;
    --bg-gradient-2: #ecdcb0;
    --bg-deep: #e2cd9c;
    --bg-card: #f1e2bc;
    --bg-card-alt: #e8d7ab;
    --bg-nav: #e6d4a2;
    --border-strong: #8a6a3a;
    --border-tint: 122,90,42;
    --text-main: #3a2a15;
    --text-gold: #8a5a16;
    --text-label: #7a6440;
    --text-muted: #8f7850;
    --text-dim: #a89470;
    --text-desc: #5c4a2c;
    --text-note: #7a6440;
    --text-chip: #6b5430;
    --accent-red-text: #b91c1c;
    --accent-green-text: #157a3d;
    --accent-blue-text: #0a6ea8;
    --accent-purple-text: #6d28d9;
    --accent-purple-solid: #7c3aed;
    --accent-gray-text: #55503f;
    --accent-gold-badge-text: #7c4a12;
    --bg-texture: rgba(90,60,20,0.035);
    --checkbox-border-idle: rgba(58,42,21,0.3);
  }
  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg-deep);
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  body {
    font-family: -apple-system, 'SF Pro', system-ui, sans-serif;
    color: var(--text-main);
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    height: 100vh;
    height: 100dvh;
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(160deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%),
      repeating-linear-gradient(45deg, var(--bg-texture) 0px, var(--bg-texture) 2px, transparent 2px, transparent 7px);
    box-sizing: border-box;
    padding: max(20px, env(safe-area-inset-top) + 14px) max(18px, env(safe-area-inset-right) + 4px) max(16px, env(safe-area-inset-bottom) + 12px) max(18px, env(safe-area-inset-left) + 4px);
    display: flex;
    flex-direction: column;
  }
  .font-cinzel { font-family: 'Cinzel', serif; }
  input::placeholder { color: var(--text-dim); }
  .hscroll { scrollbar-width: none; -ms-overflow-style: none; }
  .hscroll::-webkit-scrollbar { display: none; }
  .badge { flex: none; width: 40px; height: 40px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; user-select: none; }
  .badge-used { background: rgba(239,68,68,0.14); border: 1px solid rgba(239,68,68,0.45); color: var(--accent-red-text); font-weight: 600; }
  .badge-available { background: rgba(34,197,94,0.16); border: 1px solid rgba(34,197,94,0.5); color: var(--accent-green-text); font-weight: 700; }
  .toggle-track { width: 40px; height: 24px; border-radius: 12px; position: relative; cursor: pointer; flex: none; transition: background 150ms; }
  .toggle-knob { width: 18px; height: 18px; border-radius: 9px; background: var(--ink-bright); position: absolute; top: 3px; transition: left 150ms; }
  .icon-btn { width: 44px; height: 44px; border-radius: 6px; background: var(--bg-card); border: 1px solid var(--border-card); display: flex; align-items: center; justify-content: center; color: var(--text-label); cursor: pointer; flex: none; }
  input:disabled { opacity: 0.45; }
  @keyframes concentration-pulse {
    0%, 100% { box-shadow: inset 0 0 0 0 rgba(167,139,250,0); }
    50% { box-shadow: inset 0 0 10px 3px rgba(167,139,250,0.7); }
  }
  .concentration-active { animation: concentration-pulse 1.7s ease-in-out infinite; }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  'use strict';

  var STORAGE_KEY = 'jdr_character_tracker_state';

  function makeSpellLevels() {
    var levels = [];
    for (var i = 1; i <= 9; i++) {
      levels.push({ level: i, enabled: false, max: 0, used: [] });
    }
    return levels;
  }

  var ABILITY_KEYS = ['force', 'dexterite', 'constitution', 'intelligence', 'sagesse', 'charisme'];
  var ABILITY_LABELS = { force: 'Force', dexterite: 'Dextérité', constitution: 'Constitution', intelligence: 'Intelligence', sagesse: 'Sagesse', charisme: 'Charisme' };
  var SKILL_NAMES = ['Acrobaties', 'Arcanes', 'Athlétisme', 'Discrétion', 'Dressage', 'Escamotage', 'Histoire', 'Intimidation', 'Intuition', 'Investigation', 'Médecine', 'Nature', 'Perception', 'Persuasion', 'Religion', 'Représentation', 'Survie', 'Tromperie'];

  function makeAbilityScores() {
    var scores = {};
    ABILITY_KEYS.forEach(function (k) { scores[k] = 0; });
    return scores;
  }

  function makeSkills() {
    return SKILL_NAMES.map(function (name) { return { name: name, modifier: 0 }; });
  }

  function generateId() {
    return 'cr_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
  }

  function makeClassResource(label, max) {
    return { id: generateId(), label: label || 'Ressource de Classe', max: max || 0, used: [] };
  }

  function defaultProfile() {
    return {
      characterName: 'Mon Personnage',
      hp: { current: 10, max: 10, temp: 0 },
      spellLevels: makeSpellLevels(),
      classResources: [],
      concentration: false,
      abilityScores: makeAbilityScores(),
      skills: makeSkills()
    };
  }

  function sanitizeProfile(p) {
    if (!p.abilityScores || typeof p.abilityScores !== 'object') p.abilityScores = makeAbilityScores();
    ABILITY_KEYS.forEach(function (k) {
      if (typeof p.abilityScores[k] !== 'number' || isNaN(p.abilityScores[k])) p.abilityScores[k] = 0;
    });
    if (!Array.isArray(p.skills) || p.skills.length !== SKILL_NAMES.length) {
      p.skills = makeSkills();
    } else {
      p.skills.forEach(function (s, i) {
        if (typeof s.modifier !== 'number' || isNaN(s.modifier)) s.modifier = 0;
        if (typeof s.name !== 'string') s.name = SKILL_NAMES[i];
      });
    }
    if (!Array.isArray(p.classResources)) {
      if (p.classResource && typeof p.classResource === 'object' && p.classResource.enabled) {
        var oldMax = typeof p.classResource.max === 'number' ? p.classResource.max : 0;
        p.classResources = [{
          id: generateId(),
          label: typeof p.classResource.label === 'string' ? p.classResource.label : 'Ressource de Classe',
          max: oldMax,
          used: resizeUsedArray(p.classResource.used, oldMax)
        }];
      } else {
        p.classResources = [];
      }
    }
    delete p.classResource;
    p.classResources.forEach(function (cr) {
      if (typeof cr.id !== 'string' || !cr.id) cr.id = generateId();
      if (typeof cr.label !== 'string') cr.label = 'Ressource de Classe';
      if (typeof cr.max !== 'number' || isNaN(cr.max)) cr.max = 0;
      cr.max = Math.max(0, Math.min(20, cr.max));
      cr.used = resizeUsedArray(cr.used, cr.max);
    });
    return p;
  }

  function defaultState() {
    return { version: 1, activeProfileIndex: 0, profiles: [defaultProfile()], theme: 'dark' };
  }

  // ---- persistence ----
  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      var parsed = JSON.parse(raw);
      if (!parsed || !Array.isArray(parsed.profiles) || !parsed.profiles.length) return defaultState();
      parsed.profiles.forEach(sanitizeProfile);
      if (parsed.theme !== 'light' && parsed.theme !== 'dark') parsed.theme = 'dark';
      return parsed;
    } catch (e) {
      return defaultState();
    }
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) { /* localStorage unavailable or full: state stays in memory only */ }
  }

  function applyTheme() {
    document.documentElement.setAttribute('data-theme', state.theme);
    var themeColorMeta = document.querySelector('meta[name="theme-color"]');
    if (themeColorMeta) themeColorMeta.setAttribute('content', state.theme === 'light' ? '#ecdcb0' : '#171209');
  }

  var state = loadState();
  applyTheme();

  // ---- ephemeral UI state (not persisted) ----
  var ui = {
    view: 'tracker', // 'tracker' | 'stats' | 'grimoire' | 'settings'
    editingMax: false,
    editingTemp: false,
    shortRestOpen: false,
    shortRestChecks: { hp: false, spells: false, tempHp: false, classResource: false },
    importError: '',
    statsSearch: '',
    grimoireTab: 0, // niveau numérique (0..9) ou 'classe'
    grimoireFilters: { action: false, bonus: false, reaction: false }, // conservés entre les onglets de niveau
    settingsLevelError: '',
    disableLevelDialog: null // { level: number } quand la confirmation de désactivation est ouverte
  };

  function profile() { return state.profiles[state.activeProfileIndex]; }

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function toInt(v, fallback) {
    var n = parseInt(String(v).replace(/[^0-9-]/g, ''), 10);
    return isNaN(n) ? fallback : n;
  }
  function formatSigned(v) {
    return (v >= 0 ? '+' : '') + v;
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function resizeUsedArray(arr, max) {
    var out = [];
    for (var i = 0; i < max; i++) out.push(!!(arr && arr[i]));
    return out;
  }

  // ---- SVG icons ----
  var ICON_GEAR = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>';
  var ICON_CHECK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="var(--ink-dark)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  var ICON_CONCENTRATION = '<svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.6"/><rect x="7.5" y="7.5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="10.7" y="10.7" width="2.6" height="2.6" fill="currentColor"/></svg>';
  var ICON_TRACKER = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7.5-4.6-10-9.3C.5 8 2 4.5 5.6 4c2-.3 3.7.7 4.9 2.3C11.7 4.7 13.4 3.7 15.4 4 19 4.5 20.5 8 19 11.7 16.5 16.4 12 21 12 21z"/></svg>';
  var ICON_STATS = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M11 20V4M18 20v-7"/></svg>';
  var ICON_BOOK = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/></svg>';
  function iconResized(svg, size) {
    return svg.replace(/width="\d+"/, 'width="' + size + '"').replace(/height="\d+"/, 'height="' + size + '"');
  }

  // ---- grimoire (Calix Noctavel) ----
  var SPELLBOOK = {
    sections: [
      {
        title: "Sorts mineurs (niveau 0)",
        levelTag: "Niv. 0",
        level: 0,
        spells: [
          { name: "Moquerie cruelle", type: "ACTION", range: "18m", desc: "Jet de sauvegarde de Sagesse ou 1d4 dégâts psychiques + désavantage au prochain jet d'attaque de la cible.", note: "Fonctionne si la cible entend (sans comprendre). 2d4 au niveau 5, 3d4 au niveau 11." },
          { name: "Main de mage", type: "ACTION", range: "9m", desc: "Main spectrale : manipule des objets, ouvre des portes non verrouillées, range ou récupère un objet. Dure 1 minute.", note: "Ne peut pas attaquer ni porter plus de 5 kg." },
          { name: "Message", type: "ACTION", range: "36m", desc: "Murmure secret à une cible visible. Elle peut répondre. Traverse les obstacles (sauf métal/plomb).", note: "Durée : 1 round. La cible seule entend." },
          { name: "Thaumaturgie", type: "ACTION", range: "Illimitée", desc: "Effets mineurs : voix amplifiée, flammes, tremblements, portes. Durée 1 minute.", note: "Ascendance infernale." }
        ]
      },
      {
        title: "Niveau 1",
        levelTag: "Niv. 1",
        level: 1,
        spells: [
          { name: "Fou rire de Tasha", type: "ACTION", range: "9m · Conc. 1 min", desc: "Jet de sauvegarde de Sagesse ou la cible tombe à terre, incapable d'agir. Nouveau jet en fin de tour ou après des dégâts.", note: "Inefficace si Intelligence 4 ou moins." },
          { name: "Identification", type: "RITUEL 1 MIN", range: "Contact", desc: "Révèle les propriétés d'un objet magique (charges, sorts) ou les sorts actifs sur une créature.", note: "Utilisable sans emplacement en rituel. Nécessite une perle à 100 po + une plume de hibou." },
          { name: "Lueurs féeriques", type: "ACTION", range: "18m · Conc. 1 min", desc: "Cube de 6m : jet de sauvegarde de Dextérité ou les créatures sont illuminées. Avantage sur toutes les attaques contre elles. Annule l'invisibilité.", note: "Idéal au tour 1 si les ennemis sont groupés." },
          { name: "Mot de guérison", type: "BONUS", range: "18m", desc: "Soigne 1d4 + Cha à distance. +1d4 par niveau supérieur. Relève un allié à 0 PV sans avoir à s'approcher.", note: "Priorité si un allié tombe. Permet d'agir aussi en action ce tour." },
          { name: "Soins", type: "ACTION", range: "Contact", desc: "Soigne 1d8 + Cha au toucher. +1d8 par niveau supérieur.", note: "Nécessite de s'approcher. Préférer Mot de guérison en combat." }
        ]
      },
      {
        title: "Niveau 2",
        levelTag: "Niv. 2",
        level: 2,
        spells: [
          { name: "Image miroir", type: "ACTION", range: "Personnel · 1 min", desc: "3 doubles illusoires. Les attaques sont redirigées sur 1d20 : 6+ (3 doubles) / 8+ (2) / 11+ (1). CA du double = 10 + mod. Dex.", note: "Défense passive, pas de concentration." },
          { name: "Représailles infernales", type: "RÉACTION", range: "Portée", desc: "Quand blessée par une créature visible : 2d10 dégâts de feu à la cible. Jet de sauvegarde de Dextérité, demi-dégâts si réussi.", note: "Ascendance infernale. 1x / repos long. Lancé comme un sort de niveau 2. Disponible dès le niveau 3." },
          { name: "Silence", type: "ACTION", range: "36m · Conc. 10 min", desc: "Sphère de 6m : aucun son, immunité au tonnerre. Impossible de lancer des sorts à composante verbale dans la zone.", note: "Rituel possible. Bloque les lanceurs de sorts ennemis." },
          { name: "Ténèbres", type: "ACTION", range: "60m · Conc. 10 min", desc: "Sphère de 4,5m de ténèbres magiques. Bloque la vision normale et la vision dans le noir.", note: "Ascendance infernale. 1x / repos long. Disponible dès le niveau 5." }
        ]
      },
      {
        title: "Niveau 3",
        levelTag: "Niv. 3",
        level: 3,
        spells: [
          { name: "Communication à distance", type: "ACTION", range: "Illimitée", desc: "Message de 25 mots à une créature connue, n'importe où. Elle peut répondre immédiatement.", note: "5% d'échec si sur un autre plan d'existence." },
          { name: "Hâte", type: "ACTION", range: "9m · Conc. 1 min", desc: "Cible : vitesse x2, +2 CA, avantage aux jets de Dextérité, action supplémentaire (1 attaque / Foncer / Désengager / Se cacher / Utiliser un objet).", note: "À la fin : léthargie 1 tour. Protéger sa concentration absolument." },
          { name: "Mot de guérison de groupe", type: "BONUS", range: "18m", desc: "Jusqu'à 6 créatures visibles récupèrent chacune 1d4 + Cha. +1d4 par niveau au-delà du 3.", note: "Idéal si plusieurs alliés sont faibles simultanément." },
          { name: "Retour à la vie", type: "ACTION", range: "Contact", desc: "Ramène une créature morte depuis moins d'une minute à 1 PV.", note: "Consomme des diamants (300 po). Ne restaure pas les membres perdus." }
        ]
      },
      {
        title: "Niveau 4",
        levelTag: "Niv. 4",
        level: 4,
        spells: [
          { name: "Porte dimensionnelle", type: "ACTION", range: "150m", desc: "Téléportation vers un endroit visible, visualisé ou décrit. Peut emmener 1 créature consentante à 1,5m.", note: "Échec + 4d6 dégâts si la destination est occupée." }
        ]
      },
      {
        title: "Capacités de classe et dons",
        levelTag: "Classe",
        level: 'classe',
        spells: [
          { name: "Inspiration bardique", type: "BONUS", range: "18m", desc: "Donne 1d6 (d8 dès niveau 5) à une créature. Elle ajoute le dé à un jet après le lancer, avant l'annonce du MD.", note: "Utilisations = mod. Cha. Recharge à un repos long (repos court dès niveau 5)." },
          { name: "Mots cinglants", type: "RÉACTION", range: "18m", desc: "Après un jet (attaque/carac./dégâts) d'une créature : dépense 1 inspiration bardique, soustrait le dé du résultat.", note: "Avant l'annonce du MD. Inefficace si la cible ne peut pas entendre ou est immunisée aux charmes." },
          { name: "Chant reposant", type: "REPOS COURT", range: "–", desc: "Les alliés qui dépensent des dés de vie lors d'un repos court récupèrent +1d6 PV supplémentaires.", note: "Passe à 1d8 au niveau 9, 1d10 au niveau 13, 1d12 au niveau 17." },
          { name: "Meneur exaltant", type: "10 MIN", range: "9m", desc: "Jusqu'à 6 créatures gagnent des PV temporaires = niveau + mod. Cha. Recharge à un repos court ou long.", note: "Prérequis : Cha 13+. Idéal avant un combat anticipé." },
          { name: "Chercheur", type: "PASSIF", range: "–", desc: "Si une information est inconnue : Calix sait généralement où ou auprès de qui la trouver.", note: "Background Sage. Le MD décide si l'information est accessible." }
        ]
      }
    ]
  };

  function spellBadgeStyle(type) {
    var t = type.toUpperCase();
    if (t.indexOf('BONUS') === 0) return 'background:rgba(34,197,94,0.16);border:1px solid rgba(34,197,94,0.45);color:var(--accent-green-text);';
    if (t.indexOf('RÉACTION') === 0) return 'background:rgba(239,68,68,0.16);border:1px solid rgba(239,68,68,0.45);color:var(--accent-red-text);';
    if (t.indexOf('RITUEL') === 0) return 'background:rgba(167,139,250,0.16);border:1px solid rgba(167,139,250,0.45);color:var(--accent-purple-text);';
    if (t.indexOf('PASSIF') === 0) return 'background:rgba(148,163,184,0.16);border:1px solid rgba(148,163,184,0.45);color:var(--accent-gray-text);';
    if (t.indexOf('ACTION') === 0) return 'background:rgba(125,211,252,0.16);border:1px solid rgba(125,211,252,0.45);color:var(--accent-blue-text);';
    return 'background:rgba(var(--border-tint),0.16);border:1px solid rgba(var(--border-tint),0.45);color:var(--accent-gold-badge-text);';
  }

  // ---- render ----
  var app = document.getElementById('app');

  var PAGES = [
    { view: 'tracker', label: 'Tracker', icon: ICON_TRACKER },
    { view: 'stats', label: 'Stats', icon: ICON_STATS },
    { view: 'grimoire', label: 'Grimoire', icon: ICON_BOOK },
    { view: 'settings', label: 'Paramètres', icon: ICON_GEAR }
  ];

  function renderPage() {
    switch (ui.view) {
      case 'stats': return renderStats();
      case 'grimoire': return renderGrimoire();
      case 'settings': return renderSettings();
      default: return renderTracker();
    }
  }

  function renderBottomNav() {
    var itemsHtml = PAGES.map(function (page) {
      var active = ui.view === page.view;
      return '<div data-action="nav" data-view="' + page.view + '" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 0;cursor:pointer;color:' + (active ? 'var(--text-gold)' : 'var(--text-dim)') + '">' +
        page.icon +
        '<div style="font-size:10px;font-weight:600;letter-spacing:0.02em">' + page.label + '</div>' +
        '</div>';
    }).join('');
    return '<div style="flex:none;display:flex;align-items:stretch;border-top:1px solid rgba(var(--border-tint),0.2);background:var(--bg-nav);border-radius:12px;overflow:hidden;margin-top:4px">' + itemsHtml + '</div>';
  }

  function render() {
    document.title = 'Suivi — ' + (profile().characterName || 'Personnage');
    var prevScroller = app.querySelector('[data-scroll-root]');
    var scrollTop = prevScroller ? prevScroller.scrollTop : 0;
    var searchHadFocus = document.activeElement && document.activeElement.id === 'statsSearchInput';
    app.innerHTML =
      '<div style="display:flex;flex-direction:column;height:100%">' +
        '<div style="flex:1;min-height:0;display:flex;flex-direction:column">' + renderPage() + '</div>' +
        renderBottomNav() +
      '</div>';
    if (ui.shortRestOpen) {
      app.insertAdjacentHTML('beforeend', renderShortRestModal());
    }
    if (ui.disableLevelDialog) {
      app.insertAdjacentHTML('beforeend', renderDisableLevelModal());
    }
    var nextScroller = app.querySelector('[data-scroll-root]');
    if (nextScroller) nextScroller.scrollTop = scrollTop;
    bindEvents(searchHadFocus);
  }

  function renderTracker() {
    var p = profile();
    var hp = p.hp;

    var maxHtml = ui.editingMax
      ? '<input id="hpMaxInput" type="text" inputmode="numeric" pattern="[0-9]*" value="' + hp.max + '" style="width:60px;font-size:19px;color:var(--text-main);background:transparent;border:none;border-bottom:1px solid #ef4444;outline:none;padding:0"/>'
      : '<div id="hpMaxDisplay" style="font-size:19px;color:var(--text-muted);cursor:pointer;border-bottom:1px dashed var(--border-strong)">' + hp.max + '</div>';

    var tempHtml;
    if (ui.editingTemp) {
      tempHtml = '<div style="display:flex;align-items:baseline;gap:2px;margin-left:8px">' +
        '<div style="font-size:19px;font-weight:700;color:var(--accent-blue-text)">+</div>' +
        '<input id="tempInput" type="text" inputmode="numeric" pattern="[0-9]*" value="' + hp.temp + '" style="width:44px;font-size:19px;font-weight:700;color:var(--accent-blue-text);background:transparent;border:none;border-bottom:1px solid var(--accent-blue-text);outline:none;padding:0"/></div>';
    } else {
      tempHtml = '<div id="tempDisplay" style="font-size:19px;font-weight:700;color:var(--accent-blue-text);cursor:pointer;border-bottom:1px dashed rgba(125,211,252,0.5);margin-left:8px">+' + hp.temp + '</div>';
    }

    var spellGroupsHtml = p.spellLevels
      .filter(function (l) { return l.enabled && l.max > 0; })
      .map(function (l) {
        var badges = l.used.map(function (used, i) {
          return '<div class="badge ' + (used ? 'badge-used' : 'badge-available') + '" data-action="toggle-spell" data-level="' + l.level + '" data-index="' + i + '">' + l.level + '</div>';
        }).join('');
        return '<div style="display:flex;flex-direction:column;gap:4px">' +
          '<div style="font-size:11px;color:var(--text-muted);font-weight:600">Niveau ' + l.level + '</div>' +
          '<div class="hscroll" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:2px">' + badges + '</div>' +
          '</div>';
      }).join('');

    var classHtml = p.classResources.map(function (cr) {
      var cbadges = cr.used.map(function (used, i) {
        return '<div class="badge ' + (used ? 'badge-used' : 'badge-available') + '" data-action="toggle-class" data-id="' + cr.id + '" data-index="' + i + '">' + (i + 1) + '</div>';
      }).join('');
      return '<div style="display:flex;flex-direction:column;gap:6px">' +
        '<div style="font-size:12px;font-weight:600;color:var(--text-label);text-transform:uppercase;letter-spacing:0.08em">' + escapeHtml(cr.label || 'Ressource') + '</div>' +
        '<div class="hscroll" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:2px">' + cbadges + '</div>' +
        '</div>';
    }).join('<div style="height:10px"></div>');

    return (
      '<div style="display:flex;flex-direction:column;height:100%;gap:14px">' +
        '<div style="font-size:21px;font-weight:700;letter-spacing:0.3px" class="font-cinzel">' + escapeHtml(p.characterName) + '</div>' +

        '<div style="background:var(--bg-card);border:1px solid rgba(var(--border-tint),0.2);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:16px">' +
          '<div data-action="damage" style="flex:none;width:80px;height:76px;border-radius:6px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.45);color:#ef4444;font-size:28px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none">&minus;</div>' +
          '<div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:10px;align-items:center;text-align:center">' +
            '<div style="font-size:12px;font-weight:600;color:var(--text-label);text-transform:uppercase;letter-spacing:0.08em">Points de vie</div>' +
            '<div style="display:flex;align-items:baseline;justify-content:center;gap:6px;flex-wrap:wrap">' +
              '<div style="font-size:42px;font-weight:800;line-height:1">' + hp.current + '</div>' +
              '<div style="font-size:19px;color:var(--text-muted)">/</div>' +
              maxHtml +
              tempHtml +
            '</div>' +
            (function () {
              var currentPct = hp.max > 0 ? clamp(Math.round(hp.current / hp.max * 100), 0, 100) : 0;
              var tempPct = hp.max > 0 ? clamp(Math.round(hp.temp / hp.max * 100), 0, currentPct) : 0;
              return '<div style="width:100%;height:5px;border-radius:3px;background:rgba(239,68,68,0.35);overflow:hidden;position:relative">' +
                '<div style="height:100%;width:' + currentPct + '%;background:#22c55e"></div>' +
                (tempPct > 0 ? '<div style="position:absolute;top:0;right:' + (100 - currentPct) + '%;width:' + tempPct + '%;height:100%;background:var(--accent-blue-text)"></div>' : '') +
              '</div>';
            })() +
          '</div>' +
          '<div data-action="heal" style="flex:none;width:80px;height:76px;border-radius:6px;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.45);color:#22c55e;font-size:28px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none">+</div>' +
        '</div>' +

        '<div data-scroll-root style="flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding-right:2px;margin-top:10px">' +
          '<div style="display:flex;flex-direction:column;gap:8px">' +
            '<div style="display:flex;align-items:center;justify-content:space-between">' +
              '<div style="font-size:12px;font-weight:600;color:var(--text-label);text-transform:uppercase;letter-spacing:0.08em">Emplacements de sorts</div>' +
              '<div data-action="toggle-concentration" class="' + (p.concentration ? 'concentration-active' : '') + '" title="Concentration" style="flex:none;width:44px;height:44px;margin-right:14px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:' + (p.concentration ? 'var(--accent-purple-solid)' : 'var(--text-dim)') + ';background:' + (p.concentration ? 'rgba(167,139,250,0.18)' : 'transparent') + ';border:1px solid ' + (p.concentration ? 'rgba(167,139,250,0.6)' : 'rgba(var(--border-tint),0.25)') + '">' + ICON_CONCENTRATION + '</div>' +
            '</div>' +
            (spellGroupsHtml || '<div style="font-size:12px;color:var(--text-dim)">Aucun niveau actif - configurez-les dans les paramètres.</div>') +
          '</div>' +
          classHtml +
        '</div>' +

        '<div data-action="open-rest" style="flex:none;height:52px;border-radius:6px;background:var(--border-strong);border:1px solid rgba(var(--border-tint),0.34);color:var(--ink-bright);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;letter-spacing:0.03em" class="font-cinzel">Repos</div>' +
      '</div>'
    );
  }

  function renderStats() {
    var p = profile();
    var search = ui.statsSearch || '';
    var filteredSkills = p.skills.filter(function (s) {
      return s.name.toLowerCase().indexOf(search.toLowerCase()) !== -1;
    });

    var abilitiesHtml = ABILITY_KEYS.map(function (key) {
      return '<div style="display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--bg-card);border:1px solid rgba(var(--border-tint),0.2);border-radius:10px;padding:10px 6px">' +
        '<div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em">' + ABILITY_LABELS[key] + '</div>' +
        '<div style="font-size:19px;font-weight:700;color:var(--text-gold)" class="font-cinzel">' + formatSigned(p.abilityScores[key]) + '</div>' +
        '</div>';
    }).join('');

    var skillsHtml = filteredSkills.length
      ? filteredSkills.map(function (s, i) {
          return '<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:' + (i % 2 ? 'var(--bg-card-alt)' : 'var(--bg-card)') + ';border-bottom:1px solid rgba(var(--border-tint),0.14)">' +
            '<div style="font-size:15px;color:var(--text-main)">' + escapeHtml(s.name) + '</div>' +
            '<div style="font-size:16px;font-weight:700;color:var(--text-gold)">' + formatSigned(s.modifier) + '</div>' +
            '</div>';
        }).join('')
      : '<div style="padding:16px;text-align:center;font-size:12px;color:var(--text-dim)">Aucune compétence trouvée.</div>';

    return (
      '<div style="display:flex;flex-direction:column;height:100%;gap:14px">' +
        '<div style="font-size:21px;font-weight:700;letter-spacing:0.3px;flex:none" class="font-cinzel">Stats</div>' +
        '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;flex:none">' + abilitiesHtml + '</div>' +
        '<input id="statsSearchInput" type="text" value="' + escapeHtml(search) + '" placeholder="Rechercher une compétence…" style="flex:none;height:52px;background:var(--bg-card);border:1px solid rgba(var(--border-tint),0.24);border-radius:10px;color:var(--text-main);font-size:16px;padding:0 16px;box-sizing:border-box"/>' +
        '<div data-scroll-root style="flex:1;min-height:0;overflow-y:auto;border-radius:12px;border:1px solid rgba(var(--border-tint),0.2)">' + skillsHtml + '</div>' +
      '</div>'
    );
  }

  function maxEnabledSpellLevel() {
    var enabledLevels = profile().spellLevels.filter(function (l) { return l.enabled; }).map(function (l) { return l.level; });
    return enabledLevels.length ? Math.max.apply(null, enabledLevels) : 0;
  }

  function grimoireTabs() {
    var tabs = [];
    for (var i = 0; i <= maxEnabledSpellLevel(); i++) tabs.push(i);
    tabs.push('classe');
    return tabs;
  }

  function grimoireTabLabel(tab) {
    return tab === 'classe' ? 'Classe' : String(tab);
  }

  var GRIMOIRE_FILTERS = [
    { key: 'action', label: 'Action', prefix: 'ACTION', style: 'background:rgba(125,211,252,0.16);border:1px solid rgba(125,211,252,0.45);color:var(--accent-blue-text);' },
    { key: 'bonus', label: 'Bonus', prefix: 'BONUS', style: 'background:rgba(34,197,94,0.16);border:1px solid rgba(34,197,94,0.45);color:var(--accent-green-text);' },
    { key: 'reaction', label: 'Réaction', prefix: 'RÉACTION', style: 'background:rgba(239,68,68,0.16);border:1px solid rgba(239,68,68,0.45);color:var(--accent-red-text);' }
  ];

  function spellMatchesGrimoireFilters(spell) {
    var activeFilters = GRIMOIRE_FILTERS.filter(function (f) { return ui.grimoireFilters[f.key]; });
    if (!activeFilters.length) return true;
    var t = spell.type.toUpperCase();
    return activeFilters.some(function (f) { return t.indexOf(f.prefix) === 0; });
  }

  function renderGrimoireSection(section, spells) {
    var rowsHtml = spells.map(function (spell, i) {
      return '<div style="padding:11px 14px;background:' + (i % 2 ? 'var(--bg-card-alt)' : 'var(--bg-card)') + ';border-bottom:1px solid rgba(var(--border-tint),0.14)">' +
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">' +
          '<div style="font-size:14px;font-weight:700;color:var(--text-main);font-family:\'Cinzel\',serif">' + escapeHtml(spell.name) + '</div>' +
          '<div style="flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:3px">' +
            '<div style="display:flex;align-items:center;gap:5px">' +
              '<div style="background:rgba(var(--border-tint),0.12);border:1px solid rgba(var(--border-tint),0.32);color:var(--text-chip);padding:2px 6px;border-radius:6px;font-size:10px;font-weight:700;white-space:nowrap">' + escapeHtml(section.levelTag) + '</div>' +
              '<div style="' + spellBadgeStyle(spell.type) + 'padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:0.03em;white-space:nowrap">' + escapeHtml(spell.type) + '</div>' +
            '</div>' +
            '<div style="font-size:10px;color:var(--text-muted);white-space:nowrap">' + escapeHtml(spell.range) + '</div>' +
          '</div>' +
        '</div>' +
        '<div style="font-size:12.5px;color:var(--text-desc);margin-top:6px;line-height:1.4">' + escapeHtml(spell.desc) + '</div>' +
        (spell.note ? '<div style="font-size:11px;color:var(--text-note);font-style:italic;margin-top:4px;line-height:1.3">' + escapeHtml(spell.note) + '</div>' : '') +
      '</div>';
    }).join('');

    return '<div style="display:flex;flex-direction:column;gap:6px">' +
      '<div style="font-size:11px;color:var(--text-label);text-transform:uppercase;letter-spacing:0.06em;font-weight:600">' + escapeHtml(section.title) + '</div>' +
      '<div style="display:flex;flex-direction:column;border-radius:12px;overflow:hidden;border:1px solid rgba(var(--border-tint),0.2)">' + rowsHtml + '</div>' +
    '</div>';
  }

  function renderGrimoire() {
    var tabs = grimoireTabs();
    if (tabs.indexOf(ui.grimoireTab) === -1) ui.grimoireTab = 0;

    var tabsHtml = tabs.map(function (tab) {
      var active = tab === ui.grimoireTab;
      return '<div data-action="grimoire-tab" data-tab="' + tab + '" style="flex:none;min-width:38px;height:32px;padding:0 10px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;user-select:none;' +
        (active
          ? 'background:rgba(var(--border-tint),0.28);border:1px solid var(--border-strong);color:var(--text-gold);'
          : 'background:transparent;border:1px solid rgba(var(--border-tint),0.2);color:var(--text-dim);') +
        '">' + escapeHtml(grimoireTabLabel(tab)) + '</div>';
    }).join('');

    var filterChipsHtml = GRIMOIRE_FILTERS.map(function (f) {
      var active = !!ui.grimoireFilters[f.key];
      return '<div data-action="toggle-grimoire-filter" data-filter="' + f.key + '" style="flex:none;height:26px;padding:0 10px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:0.02em;cursor:pointer;user-select:none;' +
        (active ? f.style : 'background:transparent;border:1px solid rgba(var(--border-tint),0.25);color:var(--text-dim);') +
        '">' + escapeHtml(f.label) + '</div>';
    }).join('');

    var matchingSections = SPELLBOOK.sections.filter(function (s) { return s.level === ui.grimoireTab; });
    var sectionsWithSpells = matchingSections.map(function (s) {
      return { section: s, spells: s.spells.filter(spellMatchesGrimoireFilters) };
    }).filter(function (x) { return x.spells.length > 0; });
    var totalSpellsAtLevel = matchingSections.reduce(function (sum, s) { return sum + s.spells.length; }, 0);

    var contentHtml;
    if (sectionsWithSpells.length) {
      contentHtml = sectionsWithSpells.map(function (x) { return renderGrimoireSection(x.section, x.spells); }).join('<div style="height:14px"></div>');
    } else if (totalSpellsAtLevel === 0) {
      contentHtml = '<div style="padding:24px 4px;text-align:center;font-size:12px;color:var(--text-dim)">Aucun sort à ce niveau.</div>';
    } else {
      contentHtml = '<div style="padding:24px 4px;text-align:center;font-size:12px;color:var(--text-dim)">Aucun sort ne correspond aux filtres sélectionnés.</div>';
    }

    return (
      '<div style="display:flex;flex-direction:column;height:100%;gap:12px">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;flex:none;gap:8px">' +
          '<div style="font-size:21px;font-weight:700;letter-spacing:0.3px" class="font-cinzel">Grimoire</div>' +
          '<div style="display:flex;gap:6px">' + filterChipsHtml + '</div>' +
        '</div>' +
        '<div class="hscroll" style="flex:none;display:flex;gap:8px;overflow-x:auto;padding-bottom:2px">' + tabsHtml + '</div>' +
        '<div id="grimoireSwipe" data-scroll-root style="flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding-bottom:4px">' + contentHtml + '</div>' +
      '</div>'
    );
  }

  function toggleTrackStyle(enabled) {
    return 'background:' + (enabled ? '#ef4444' : 'var(--border-strong)') + ';';
  }
  function toggleKnobStyle(enabled) {
    return 'left:' + (enabled ? '19px' : '3px') + ';';
  }

  function renderSettings() {
    var p = profile();

    var levelRows = p.spellLevels.map(function (l, idx) {
      var lowerLevelsEnabled = p.spellLevels.slice(0, idx).every(function (x) { return x.enabled; });
      var locked = !l.enabled && !lowerLevelsEnabled;
      return '<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg-card);border-bottom:1px solid rgba(var(--border-tint),0.14);' + (locked ? 'opacity:0.45;' : '') + '">' +
        '<div style="width:56px;font-size:13px;font-weight:600;color:var(--text-main)">Niv. ' + l.level + '</div>' +
        '<div class="toggle-track" style="' + toggleTrackStyle(l.enabled) + '" data-action="toggle-level" data-level="' + l.level + '"><div class="toggle-knob" style="' + toggleKnobStyle(l.enabled) + '"></div></div>' +
        '<div style="flex:1"></div>' +
        '<label style="font-size:11px;color:var(--text-muted)">Max</label>' +
        '<input type="text" inputmode="numeric" pattern="[0-9]*" value="' + l.max + '" ' + (l.enabled ? '' : 'disabled') + ' data-action="level-max" data-level="' + l.level + '" style="width:42px;height:34px;background:var(--bg-deep);border:1px solid rgba(var(--border-tint),0.24);border-radius:8px;color:var(--text-main);font-size:13px;text-align:center;box-sizing:border-box"/>' +
        '</div>';
    }).join('');

    var classResourceRows = p.classResources.map(function (cr) {
      return '<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg-card);border-bottom:1px solid rgba(var(--border-tint),0.14)">' +
        '<input type="text" data-action="class-resource-label" data-id="' + cr.id + '" value="' + escapeHtml(cr.label) + '" placeholder="Libellé (ex. Ki)" style="flex:1;min-width:0;height:36px;background:var(--bg-deep);border:1px solid rgba(var(--border-tint),0.24);border-radius:8px;color:var(--text-main);font-size:13px;padding:0 10px;box-sizing:border-box"/>' +
        '<label style="font-size:11px;color:var(--text-muted)">Max</label>' +
        '<input type="text" inputmode="numeric" pattern="[0-9]*" value="' + cr.max + '" data-action="class-resource-max" data-id="' + cr.id + '" style="width:42px;height:36px;background:var(--bg-deep);border:1px solid rgba(var(--border-tint),0.24);border-radius:8px;color:var(--text-main);font-size:13px;text-align:center;box-sizing:border-box"/>' +
        '<div data-action="remove-class-resource" data-id="' + cr.id + '" style="flex:none;width:36px;height:36px;border-radius:8px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);color:#ef4444;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none">&times;</div>' +
        '</div>';
    }).join('');

    return (
      '<div data-scroll-root style="display:flex;flex-direction:column;height:100%;gap:14px;overflow-y:auto">' +
        '<div style="font-size:21px;font-weight:700;letter-spacing:0.3px;flex:none" class="font-cinzel">Paramètres</div>' +

        '<div style="display:flex;flex-direction:column;gap:6px;flex:none">' +
          '<label style="font-size:11px;color:var(--text-label);text-transform:uppercase;letter-spacing:0.06em">Nom du personnage</label>' +
          '<input type="text" id="nameInput" value="' + escapeHtml(p.characterName) + '" style="height:44px;background:var(--bg-card);border:1px solid rgba(var(--border-tint),0.24);border-radius:10px;color:var(--text-main);font-size:15px;padding:0 12px;box-sizing:border-box"/>' +
        '</div>' +

        '<div style="display:flex;flex-direction:column;gap:6px;flex:none">' +
          '<label style="font-size:11px;color:var(--text-label);text-transform:uppercase;letter-spacing:0.06em">Thème</label>' +
          '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--bg-card);border-radius:12px;border:1px solid rgba(var(--border-tint),0.2)">' +
            '<div style="font-size:13px;font-weight:600">' + (state.theme === 'light' ? 'Clair (ocre)' : 'Sombre') + '</div>' +
            '<div class="toggle-track" style="' + toggleTrackStyle(state.theme === 'light') + '" data-action="toggle-theme"><div class="toggle-knob" style="' + toggleKnobStyle(state.theme === 'light') + '"></div></div>' +
          '</div>' +
        '</div>' +

        '<div style="display:flex;flex-direction:column;gap:6px;flex:none">' +
          '<label style="font-size:11px;color:var(--text-label);text-transform:uppercase;letter-spacing:0.06em">Emplacements de sorts</label>' +
          '<div style="display:flex;flex-direction:column;border-radius:12px;overflow:hidden;border:1px solid rgba(var(--border-tint),0.2)">' + levelRows + '</div>' +
          (ui.settingsLevelError ? '<div style="font-size:11px;color:#ef4444">' + escapeHtml(ui.settingsLevelError) + '</div>' : '') +
        '</div>' +

        '<div style="display:flex;flex-direction:column;gap:6px;flex:none">' +
          '<label style="font-size:11px;color:var(--text-label);text-transform:uppercase;letter-spacing:0.06em">Ressource(s) de classe</label>' +
          (p.classResources.length
            ? '<div style="display:flex;flex-direction:column;border-radius:12px;overflow:hidden;border:1px solid rgba(var(--border-tint),0.2)">' + classResourceRows + '</div>'
            : '') +
          '<div data-action="add-class-resource" style="height:44px;border-radius:10px;background:var(--bg-card);border:1px dashed rgba(var(--border-tint),0.4);color:var(--text-label);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center">+ Ajouter une ressource</div>' +
        '</div>' +

        '<div style="display:flex;flex-direction:column;gap:6px;flex:none">' +
          '<label style="font-size:11px;color:var(--text-label);text-transform:uppercase;letter-spacing:0.06em">Caractéristiques</label>' +
          '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px;background:var(--bg-card);border-radius:12px;border:1px solid rgba(var(--border-tint),0.2)">' +
            ABILITY_KEYS.map(function (key) {
              return '<div style="display:flex;flex-direction:column;gap:4px;min-width:0">' +
                '<label style="font-size:11px;color:var(--text-muted);text-align:center">' + ABILITY_LABELS[key] + '</label>' +
                '<input type="text" inputmode="text" pattern="-?[0-9]*" data-action="ability-input" data-key="' + key + '" value="' + formatSigned(p.abilityScores[key]) + '" style="width:100%;height:44px;background:var(--bg-deep);border:1px solid rgba(var(--border-tint),0.24);border-radius:8px;color:var(--text-main);font-size:15px;text-align:center;box-sizing:border-box"/>' +
                '</div>';
            }).join('') +
          '</div>' +
        '</div>' +

        '<div style="display:flex;flex-direction:column;gap:6px;flex:none">' +
          '<label style="font-size:11px;color:var(--text-label);text-transform:uppercase;letter-spacing:0.06em">Compétences</label>' +
          '<div style="display:flex;flex-direction:column;border-radius:12px;overflow:hidden;border:1px solid rgba(var(--border-tint),0.2)">' +
            p.skills.map(function (s, idx) {
              return '<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg-card);border-bottom:1px solid rgba(var(--border-tint),0.14)">' +
                '<div style="flex:1;font-size:13px;font-weight:600;color:var(--text-main)">' + escapeHtml(s.name) + '</div>' +
                '<div data-action="skill-dec" data-index="' + idx + '" style="flex:none;width:36px;height:36px;border-radius:8px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);color:#ef4444;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none">&minus;</div>' +
                '<input type="text" inputmode="text" pattern="-?[0-9]*" data-action="skill-input" data-index="' + idx + '" value="' + formatSigned(s.modifier) + '" style="width:44px;height:36px;background:var(--bg-deep);border:1px solid rgba(var(--border-tint),0.24);border-radius:8px;color:var(--text-main);font-size:13px;text-align:center;box-sizing:border-box"/>' +
                '<div data-action="skill-inc" data-index="' + idx + '" style="flex:none;width:36px;height:36px;border-radius:8px;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.4);color:#22c55e;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none">+</div>' +
                '</div>';
            }).join('') +
          '</div>' +
        '</div>' +

        '<div style="display:flex;gap:10px;margin-top:2px;flex:none">' +
          '<div data-action="export-json" style="flex:1;height:46px;border-radius:6px;background:var(--bg-card);border:1px solid rgba(var(--border-tint),0.24);color:var(--text-main);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center">Exporter (JSON)</div>' +
          '<label style="flex:1;height:46px;border-radius:6px;background:var(--bg-card);border:1px solid rgba(var(--border-tint),0.24);color:var(--text-main);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer">' +
            'Importer (JSON)' +
            '<input type="file" accept="application/json" id="importInput" style="display:none"/>' +
          '</label>' +
        '</div>' +
        (ui.importError ? '<div style="flex:none;font-size:12px;color:#ef4444;text-align:center">' + escapeHtml(ui.importError) + '</div>' : '') +
      '</div>'
    );
  }

  function renderShortRestModal() {
    var p = profile();
    var checks = ui.shortRestChecks;
    var rows = [
      { key: 'hp', label: 'Total de PV' },
      { key: 'spells', label: 'Emplacements de sorts' },
      { key: 'tempHp', label: 'PV temporaires' },
      { key: 'classResource', label: 'Ressource(s) de classe' }
    ];
    var rowsHtml = rows.map(function (r) {
      var checked = !!checks[r.key];
      return '<div data-action="toggle-rest-check" data-key="' + r.key + '" style="display:flex;align-items:center;gap:10px;height:40px;cursor:pointer">' +
        '<div style="width:22px;height:22px;border-radius:6px;flex:none;display:flex;align-items:center;justify-content:center;background:' + (checked ? 'var(--ink-bright)' : 'transparent') + ';border:1px solid ' + (checked ? 'var(--ink-bright)' : 'var(--checkbox-border-idle)') + '">' + (checked ? ICON_CHECK : '') + '</div>' +
        '<div style="font-size:13px">' + escapeHtml(r.label) + '</div>' +
        '</div>';
    }).join('');

    return '<div id="restOverlay" style="position:absolute;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;box-sizing:border-box">' +
      '<div style="width:100%;max-width:300px;background:var(--bg-card);border:1px solid rgba(var(--border-tint),0.3);border-radius:16px;padding:18px;display:flex;flex-direction:column;gap:12px">' +
        '<div style="font-size:17px;font-weight:700;color:var(--text-gold)" class="font-cinzel">Repos</div>' +
        rowsHtml +
        '<div style="display:flex;gap:10px;margin-top:4px">' +
          '<div data-action="cancel-rest" style="flex:1;height:44px;border-radius:6px;background:transparent;border:1px solid rgba(var(--border-tint),0.34);color:var(--text-label);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center">Annuler</div>' +
          '<div data-action="confirm-rest" style="flex:1;height:44px;border-radius:6px;background:var(--ink-bright);border:none;color:var(--ink-dark);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center">Valider</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  function renderDisableLevelModal() {
    var level = ui.disableLevelDialog.level;
    return '<div id="disableLevelOverlay" style="position:absolute;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;box-sizing:border-box">' +
      '<div style="width:100%;max-width:300px;background:var(--bg-card);border:1px solid rgba(var(--border-tint),0.3);border-radius:16px;padding:18px;display:flex;flex-direction:column;gap:12px">' +
        '<div style="font-size:17px;font-weight:700;color:var(--text-gold)" class="font-cinzel">Désactiver le niveau ' + level + '</div>' +
        '<div style="font-size:13px;color:var(--text-desc);line-height:1.4">Les niveaux ' + level + ' et supérieurs actuellement actifs seront tous désactivés. Continuer ?</div>' +
        '<div style="display:flex;gap:10px;margin-top:4px">' +
          '<div data-action="cancel-disable-level" style="flex:1;height:44px;border-radius:6px;background:transparent;border:1px solid rgba(var(--border-tint),0.34);color:var(--text-label);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center">Annuler</div>' +
          '<div data-action="confirm-disable-level" style="flex:1;height:44px;border-radius:6px;background:#ef4444;border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center">Désactiver</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  // ---- event binding ----
  function bindEvents(searchHadFocus) {
    app.querySelectorAll('[data-action]').forEach(function (el) {
      el.addEventListener('click', onAction);
    });

    var hpMaxInput = document.getElementById('hpMaxInput');
    if (hpMaxInput) {
      hpMaxInput.focus();
      hpMaxInput.select();
      hpMaxInput.addEventListener('blur', function () {
        profile().hp.max = clamp(toInt(hpMaxInput.value, profile().hp.max), 0, 999);
        profile().hp.current = clamp(profile().hp.current, 0, profile().hp.max);
        ui.editingMax = false;
        saveState();
        render();
      });
      hpMaxInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') hpMaxInput.blur(); });
    }

    var tempInput = document.getElementById('tempInput');
    if (tempInput) {
      tempInput.focus();
      tempInput.select();
      tempInput.addEventListener('blur', function () {
        profile().hp.temp = clamp(toInt(tempInput.value, profile().hp.temp), 0, 999);
        ui.editingTemp = false;
        saveState();
        render();
      });
      tempInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') tempInput.blur(); });
    }

    var nameInput = document.getElementById('nameInput');
    if (nameInput) {
      nameInput.addEventListener('input', function () {
        profile().characterName = nameInput.value;
        saveState();
      });
    }

    app.querySelectorAll('[data-action="class-resource-label"]').forEach(function (el) {
      el.addEventListener('input', function () {
        var id = el.getAttribute('data-id');
        var cr = profile().classResources.find(function (x) { return x.id === id; });
        if (cr) { cr.label = el.value; saveState(); }
      });
    });

    app.querySelectorAll('[data-action="class-resource-max"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var id = el.getAttribute('data-id');
        var cr = profile().classResources.find(function (x) { return x.id === id; });
        if (!cr) return;
        var max = clamp(toInt(el.value, cr.max), 0, 20);
        cr.max = max;
        cr.used = resizeUsedArray(cr.used, max);
        saveState();
        render();
      });
    });

    app.querySelectorAll('[data-action="level-max"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var level = parseInt(el.getAttribute('data-level'), 10);
        var l = profile().spellLevels.find(function (x) { return x.level === level; });
        var max = clamp(toInt(el.value, l.max), 0, 12);
        l.max = max;
        l.used = resizeUsedArray(l.used, max);
        saveState();
        render();
      });
    });

    var importInput = document.getElementById('importInput');
    if (importInput) {
      importInput.addEventListener('change', onImportFile);
    }

    var statsSearchInput = document.getElementById('statsSearchInput');
    if (statsSearchInput) {
      if (searchHadFocus) {
        statsSearchInput.focus();
        var caret = statsSearchInput.value.length;
        statsSearchInput.setSelectionRange(caret, caret);
      }
      statsSearchInput.addEventListener('input', function () {
        ui.statsSearch = statsSearchInput.value;
        render();
      });
    }

    app.querySelectorAll('[data-action="ability-input"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var key = el.getAttribute('data-key');
        var scores = profile().abilityScores;
        scores[key] = clamp(toInt(el.value, scores[key]), -99, 99);
        saveState();
        render();
      });
    });

    app.querySelectorAll('[data-action="skill-input"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var idx = parseInt(el.getAttribute('data-index'), 10);
        var skill = profile().skills[idx];
        skill.modifier = clamp(toInt(el.value, skill.modifier), -99, 99);
        saveState();
        render();
      });
    });

    var grimoireSwipe = document.getElementById('grimoireSwipe');
    if (grimoireSwipe) {
      var touchStartX = 0, touchStartY = 0, touchActive = false;
      grimoireSwipe.addEventListener('touchstart', function (e) {
        if (e.touches.length !== 1) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchActive = true;
      }, { passive: true });
      grimoireSwipe.addEventListener('touchend', function (e) {
        if (!touchActive) return;
        touchActive = false;
        var touch = e.changedTouches[0];
        var dx = touch.clientX - touchStartX;
        var dy = touch.clientY - touchStartY;
        if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
          grimoireStep(dx < 0 ? 1 : -1);
        }
      }, { passive: true });
    }
  }

  function grimoireStep(delta) {
    var tabs = grimoireTabs();
    var idx = tabs.indexOf(ui.grimoireTab);
    if (idx === -1) idx = 0;
    idx = clamp(idx + delta, 0, tabs.length - 1);
    ui.grimoireTab = tabs[idx];
    render();
  }

  function onAction(e) {
    var action = e.currentTarget.getAttribute('data-action');
    switch (action) {
      case 'nav': ui.view = e.currentTarget.getAttribute('data-view'); render(); break;

      case 'toggle-theme':
        state.theme = state.theme === 'light' ? 'dark' : 'light';
        applyTheme();
        saveState(); render();
        break;

      case 'damage': applyDamage(); break;
      case 'heal': applyHeal(); break;

      case 'toggle-spell': {
        var level = parseInt(e.currentTarget.getAttribute('data-level'), 10);
        var idx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
        var l = profile().spellLevels.find(function (x) { return x.level === level; });
        l.used[idx] = !l.used[idx];
        saveState(); render();
        break;
      }
      case 'toggle-class': {
        var crId = e.currentTarget.getAttribute('data-id');
        var cidx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
        var cr = profile().classResources.find(function (x) { return x.id === crId; });
        if (cr) { cr.used[cidx] = !cr.used[cidx]; saveState(); render(); }
        break;
      }
      case 'add-class-resource': {
        profile().classResources.push(makeClassResource('Ressource de Classe', 0));
        saveState(); render();
        break;
      }
      case 'remove-class-resource': {
        var removeId = e.currentTarget.getAttribute('data-id');
        var crs = profile().classResources;
        var removeIdx = crs.findIndex(function (x) { return x.id === removeId; });
        if (removeIdx !== -1) crs.splice(removeIdx, 1);
        saveState(); render();
        break;
      }

      case 'toggle-level': {
        var lvl = parseInt(e.currentTarget.getAttribute('data-level'), 10);
        var levels = profile().spellLevels;
        var sl = levels.find(function (x) { return x.level === lvl; });
        if (!sl.enabled) {
          var lowerLevelsEnabled = levels.filter(function (x) { return x.level < lvl; }).every(function (x) { return x.enabled; });
          if (!lowerLevelsEnabled) {
            ui.settingsLevelError = 'Activez d\'abord les niveaux inférieurs.';
            render();
            break;
          }
          sl.enabled = true;
          ui.settingsLevelError = '';
          saveState(); render();
        } else {
          var higherLevelsEnabled = levels.some(function (x) { return x.level > lvl && x.enabled; });
          if (higherLevelsEnabled) {
            ui.disableLevelDialog = { level: lvl };
            render();
          } else {
            sl.enabled = false;
            saveState(); render();
          }
        }
        break;
      }
      case 'cancel-disable-level':
        ui.disableLevelDialog = null;
        render();
        break;
      case 'confirm-disable-level': {
        var disableFrom = ui.disableLevelDialog.level;
        profile().spellLevels.forEach(function (x) {
          if (x.level >= disableFrom) x.enabled = false;
        });
        ui.disableLevelDialog = null;
        saveState(); render();
        break;
      }
      case 'grimoire-tab': {
        var tabValue = e.currentTarget.getAttribute('data-tab');
        ui.grimoireTab = tabValue === 'classe' ? 'classe' : parseInt(tabValue, 10);
        render();
        break;
      }
      case 'toggle-grimoire-filter': {
        var filterKey = e.currentTarget.getAttribute('data-filter');
        ui.grimoireFilters[filterKey] = !ui.grimoireFilters[filterKey];
        render();
        break;
      }
      case 'toggle-concentration': {
        profile().concentration = !profile().concentration;
        saveState(); render();
        break;
      }
      case 'skill-inc': {
        var incIdx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
        var incSkill = profile().skills[incIdx];
        incSkill.modifier = clamp(incSkill.modifier + 1, -99, 99);
        saveState(); render();
        break;
      }
      case 'skill-dec': {
        var decIdx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
        var decSkill = profile().skills[decIdx];
        decSkill.modifier = clamp(decSkill.modifier - 1, -99, 99);
        saveState(); render();
        break;
      }

      case 'open-rest':
        ui.shortRestChecks = { hp: false, spells: false, tempHp: false, classResource: false };
        ui.shortRestOpen = true;
        render();
        break;
      case 'cancel-rest':
        ui.shortRestOpen = false;
        render();
        break;
      case 'toggle-rest-check': {
        var key = e.currentTarget.getAttribute('data-key');
        ui.shortRestChecks[key] = !ui.shortRestChecks[key];
        render();
        break;
      }
      case 'confirm-rest':
        confirmRest();
        break;

      case 'export-json': exportJson(); break;

      default: break;
    }

    if (action === 'hp-max-click') startEditMax();
  }

  // hp max / temp click-to-edit triggers via delegated ids (added after render since dynamic)
  app.addEventListener('click', function (e) {
    if (e.target && e.target.id === 'hpMaxDisplay') { ui.editingMax = true; render(); }
    if (e.target && e.target.id === 'tempDisplay') { ui.editingTemp = true; render(); }
  });

  function startEditMax() { ui.editingMax = true; render(); }

  function applyDamage() {
    var hp = profile().hp;
    if (hp.temp > 0) {
      hp.temp -= 1;
    } else {
      hp.current = clamp(hp.current - 1, 0, hp.max);
    }
    saveState();
    render();
  }

  function applyHeal() {
    var hp = profile().hp;
    if (hp.current >= hp.max) {
      hp.temp = clamp(hp.temp + 1, 0, 999);
    } else {
      hp.current = clamp(hp.current + 1, 0, hp.max);
    }
    saveState();
    render();
  }

  function confirmRest() {
    var p = profile();
    var checks = ui.shortRestChecks;
    if (checks.hp) p.hp.current = p.hp.max;
    if (checks.tempHp) p.hp.temp = 0;
    if (checks.spells) {
      p.spellLevels.forEach(function (l) {
        if (l.enabled) l.used = l.used.map(function () { return false; });
      });
    }
    if (checks.classResource) {
      p.classResources.forEach(function (cr) {
        cr.used = cr.used.map(function () { return false; });
      });
    }
    ui.shortRestOpen = false;
    saveState();
    render();
  }

  function exportJson() {
    var p = profile();
    var today = new Date().toISOString().slice(0, 10);
    var blob = new Blob([JSON.stringify(p, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'jdr_save_' + today + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function isValidProfile(data) {
    if (!data || typeof data !== 'object') return false;
    if (typeof data.characterName !== 'string') return false;
    if (!data.hp || typeof data.hp.current !== 'number' || typeof data.hp.max !== 'number' || typeof data.hp.temp !== 'number') return false;
    if (!Array.isArray(data.spellLevels) || data.spellLevels.length !== 9) return false;
    for (var i = 0; i < data.spellLevels.length; i++) {
      var l = data.spellLevels[i];
      if (typeof l.level !== 'number' || typeof l.enabled !== 'boolean' || typeof l.max !== 'number' || !Array.isArray(l.used)) return false;
    }
    if (data.classResources !== undefined) {
      if (!Array.isArray(data.classResources)) return false;
      for (var cri = 0; cri < data.classResources.length; cri++) {
        var criItem = data.classResources[cri];
        if (!criItem || typeof criItem.label !== 'string' || typeof criItem.max !== 'number' || !Array.isArray(criItem.used)) return false;
      }
    } else if (data.classResource !== undefined) {
      if (!data.classResource || typeof data.classResource.enabled !== 'boolean' || typeof data.classResource.max !== 'number' || !Array.isArray(data.classResource.used)) return false;
    } else {
      return false;
    }
    if (data.abilityScores !== undefined) {
      if (typeof data.abilityScores !== 'object' || !data.abilityScores) return false;
      for (var a = 0; a < ABILITY_KEYS.length; a++) {
        if (typeof data.abilityScores[ABILITY_KEYS[a]] !== 'number') return false;
      }
    }
    if (data.skills !== undefined) {
      if (!Array.isArray(data.skills) || data.skills.length !== SKILL_NAMES.length) return false;
      for (var s = 0; s < data.skills.length; s++) {
        if (typeof data.skills[s].name !== 'string' || typeof data.skills[s].modifier !== 'number') return false;
      }
    }
    return true;
  }

  function onImportFile(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var data = JSON.parse(String(reader.result));
        if (!isValidProfile(data)) throw new Error('invalid');
        state.profiles[state.activeProfileIndex] = sanitizeProfile(data);
        ui.importError = '';
        saveState();
        render();
      } catch (err) {
        ui.importError = 'Fichier invalide';
        render();
      }
    };
    reader.onerror = function () {
      ui.importError = 'Fichier invalide';
      render();
    };
    reader.readAsText(file);
  }

  render();

  // ---- PWA service worker (best-effort, no-op if unsupported) ----
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () { /* offline support unavailable, app still works online */ });
    });
  }
})();
</script>
</body>
</html>
