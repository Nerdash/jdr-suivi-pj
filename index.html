                '</div>';
            }).join('') +
          '</div>' +
        '</div>';

    var blocks = [nameBlock, combatBlock, attacksBlock, spellLevelsBlock, classResourcesBlock, abilitiesBlock, savingThrowsBlock, skillsBlock];

    var footerHtml = editing
      ? '<div style="display:flex;gap:10px;flex:none">' +
          '<div data-action="cancel-edit-character" style="flex:1;height:48px;border-radius:10px;background:transparent;border:1px solid rgba(var(--border-tint),0.34);color:var(--text-label);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center">Annuler</div>' +

        '</div>'
      : '<div data-action="start-edit-character" style="flex:none;height:48px;border-radius:10px;background:var(--border-strong);border:1px solid rgba(var(--border-tint),0.34);color:var(--ink-bright);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center" class="font-cinzel">Modifier</div>';

    return (
      '<div style="display:flex;flex-direction:column;height:100%;gap:14px">' +
        renderSettingsHeader('Paramétrer le Personnage') +
        '<div data-scroll-root style="flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:14px">' +
          blocks.join(SETTINGS_SEPARATOR) +
        '</div>' +
        footerHtml +
      '</div>'
    );
  }

  function renderSettingsGrimoire() {
    var isDeneor = state.activeCharacterId === 'deneor';
    var bodyHtml = isDeneor
      ? ('<div style="font-size:12px;color:var(--text-dim);line-height:1.4">Le Grimoire de Deneor Sentariel utilise un système de préparation de sorts : les sorts de serment, les capacités de classe et les passifs sont toujours disponibles, le reste doit être préparé.</div>' +
        '<div style="display:flex;flex-direction:column;gap:6px;flex:none">' +
          '<label style="font-size:11px;color:var(--text-label);text-transform:uppercase;letter-spacing:0.06em">Sorts préparés</label>' +
          '<div data-action="open-grimoire-prepare" data-back="settings-grimoire" style="height:46px;border-radius:6px;background:var(--bg-card);border:1px solid rgba(var(--border-tint),0.24);color:var(--text-main);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center">Préparer mes sorts</div>' +

  function renderSettingsApp() {
    var saveBlock =

  // ---- event binding ----
  function bindEvents(searchHadFocus) {
    app.querySelectorAll('[data-action]').forEach(function (el) {
      el.addEventListener('click', onAction);
    });

    var hpMaxInput = document.getElementById('hpMaxInput');
    if (hpMaxInput) {
      hpMaxInput.focus();
      hpMaxInput.select();
      hpMaxInput.addEventListener('blur', function () {
        profile().hp.max = clamp(toInt(hpMaxInput.value, profile().hp.max), 0, 999);
        profile().hp.current = clamp(profile().hp.current, 0, profile().hp.max);
        ui.editingMax = false;
        saveState();
        render();
      });
      hpMaxInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') hpMaxInput.blur(); });
    }

    var tempInput = document.getElementById('tempInput');
    if (tempInput) {
      tempInput.focus();
      tempInput.select();
      tempInput.addEventListener('blur', function () {
        profile().hp.temp = clamp(toInt(tempInput.value, profile().hp.temp), 0, 999);
        ui.editingTemp = false;
        saveState();
        render();
      });
      tempInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') tempInput.blur(); });
    }

    var nameInput = document.getElementById('nameInput');
    if (nameInput) {
      nameInput.addEventListener('input', function () {
        settingsCharacterProfile().characterName = nameInput.value;
      });
    }

    app.querySelectorAll('[data-action="class-resource-label"]').forEach(function (el) {
      el.addEventListener('input', function () {
        var id = el.getAttribute('data-id');
        var cr = settingsCharacterProfile().classResources.find(function (x) { return x.id === id; });
        if (cr) cr.label = el.value;
      });
    });

    app.querySelectorAll('[data-action="class-resource-max"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var id = el.getAttribute('data-id');
        var cr = settingsCharacterProfile().classResources.find(function (x) { return x.id === id; });
        if (!cr) return;
        var max = clamp(toInt(el.value, cr.max), 0, cr.type === 'counter' ? 99 : 20);
        cr.max = max;
        if (cr.type === 'counter') cr.current = clamp(cr.current, 0, max);
        else cr.used = resizeUsedArray(cr.used, max);
        render();
      });
    });

    app.querySelectorAll('[data-action="attack-name"]').forEach(function (el) {
      el.addEventListener('input', function () {
        var id = el.getAttribute('data-id');
        var atk = settingsCharacterProfile().attacks.find(function (x) { return x.id === id; });
        if (atk) atk.name = el.value;
      });
    });

    app.querySelectorAll('[data-action="attack-damage-dice"]').forEach(function (el) {
      el.addEventListener('input', function () {
        var id = el.getAttribute('data-id');
        var atk = settingsCharacterProfile().attacks.find(function (x) { return x.id === id; });
        if (atk) atk.damageDice = el.value;
      });
    });

    app.querySelectorAll('[data-action="attack-damage-type"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var id = el.getAttribute('data-id');
        var atk = settingsCharacterProfile().attacks.find(function (x) { return x.id === id; });
        if (atk) atk.damageType = el.value;
      });
    });

    app.querySelectorAll('[data-action="attack-range"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var id = el.getAttribute('data-id');
        var atk = settingsCharacterProfile().attacks.find(function (x) { return x.id === id; });
        if (!atk) return;
        atk.rangeMeters = clamp(toInt(el.value, atk.rangeMeters), 0, 999);
        render();
      });
    });

    app.querySelectorAll('[data-action="attack-bonus"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var id = el.getAttribute('data-id');
        var atk = settingsCharacterProfile().attacks.find(function (x) { return x.id === id; });
        if (!atk) return;
        atk.attackBonus = clamp(toInt(el.value, atk.attackBonus), -99, 99);
        render();
      });
    });

    app.querySelectorAll('[data-action="attack-damage-bonus"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var id = el.getAttribute('data-id');
        var atk = settingsCharacterProfile().attacks.find(function (x) { return x.id === id; });
        if (!atk) return;
        atk.damageBonus = clamp(toInt(el.value, atk.damageBonus), -99, 99);
        render();
      });
    });

    app.querySelectorAll('[data-action="level-max"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var level = parseInt(el.getAttribute('data-level'), 10);
        var l = settingsCharacterProfile().spellLevels.find(function (x) { return x.level === level; });
        var max = clamp(toInt(el.value, l.max), 0, 12);
        l.max = max;
        l.used = resizeUsedArray(l.used, max);
        render();
      });
    });

    var statsSearchInput = document.getElementById('statsSearchInput');
    if (statsSearchInput) {
      if (searchHadFocus) {
        statsSearchInput.focus();
        var caret = statsSearchInput.value.length;
        statsSearchInput.setSelectionRange(caret, caret);
      }
      statsSearchInput.addEventListener('input', function () {
        ui.statsSearch = statsSearchInput.value;
        render();
      });

      var statsResetBtn = document.getElementById('statsResetBtn');
      var statsAbilitiesBlock = document.getElementById('statsAbilitiesBlock');
      var statsGoldBadge = document.getElementById('statsGoldBadge');
      if (statsResetBtn || statsAbilitiesBlock) {
        // Bascule directement le style au focus/blur (pas de render()) pour éviter une boucle :
        // un render() re-focaliserait le nouvel input, qui re-déclencherait 'focus', etc.
        var updateStatsFocusUI = function () {
          var focused = document.activeElement === statsSearchInput;
          if (statsResetBtn) {
            statsResetBtn.style.opacity = focused ? '1' : '0';
            statsResetBtn.style.pointerEvents = focused ? 'auto' : 'none';
          }
          if (statsAbilitiesBlock) statsAbilitiesBlock.style.display = focused ? 'none' : '';
          if (statsGoldBadge) statsGoldBadge.style.visibility = focused ? 'hidden' : '';
        };
        updateStatsFocusUI();
        statsSearchInput.addEventListener('focus', updateStatsFocusUI);
        statsSearchInput.addEventListener('blur', updateStatsFocusUI);
      }
    }

    app.querySelectorAll('[data-action="ability-input"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var key = el.getAttribute('data-key');
        var scores = settingsCharacterProfile().abilityScores;
        scores[key] = clamp(toInt(el.value, scores[key]), -99, 99);
        render();
      });
    });

    app.querySelectorAll('[data-action="saving-throw-input"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var key = el.getAttribute('data-key');
        var throws = settingsCharacterProfile().savingThrows;
        throws[key] = clamp(toInt(el.value, throws[key]), -99, 99);
        render();
      });
    });

    app.querySelectorAll('[data-action="combat-input"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var key = el.getAttribute('data-key');
        var stats = settingsCharacterProfile().combatStats;
        var min = key === 'initiative' ? -99 : 0;
        stats[key] = clamp(toInt(el.value, stats[key]), min, 99);
        render();
      });
    });

    var goldInput = document.getElementById('goldInput');
    if (goldInput) {
      goldInput.addEventListener('change', function () {
        ui.goldModalDraft = clamp(toInt(goldInput.value, ui.goldModalDraft), 0, 10000);
        render();
      });
    }

    app.querySelectorAll('[data-action="skill-input"]').forEach(function (el) {
      el.addEventListener('change', function () {
        var idx = parseInt(el.getAttribute('data-index'), 10);
        var skill = settingsCharacterProfile().skills[idx];
        skill.modifier = clamp(toInt(el.value, skill.modifier), -99, 99);
        render();
      });
    });

    var grimoireSwipe = document.getElementById('grimoireSwipe');
    if (grimoireSwipe) {
      var touchStartX = 0, touchStartY = 0, touchActive = false;
      grimoireSwipe.addEventListener('touchstart', function (e) {
        if (e.touches.length !== 1) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchActive = true;
      }, { passive: true });
      grimoireSwipe.addEventListener('touchend', function (e) {
        if (!touchActive) return;
        touchActive = false;
        var touch = e.changedTouches[0];
        var dx = touch.clientX - touchStartX;
        var dy = touch.clientY - touchStartY;
        if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
          grimoireStep(dx < 0 ? 1 : -1);
        }
      }, { passive: true });

      var grimoirePrepareFab = document.getElementById('grimoirePrepareFab');
      if (grimoirePrepareFab) {
        var updateFabVisibility = function () {
          var atTop = grimoireSwipe.scrollTop <= 4;
          grimoirePrepareFab.style.opacity = atTop ? '1' : '0';
          grimoirePrepareFab.style.pointerEvents = atTop ? 'auto' : 'none';
        };
        updateFabVisibility();
        grimoireSwipe.addEventListener('scroll', updateFabVisibility, { passive: true });
      }
    }

    var characterCarouselSwipe = document.getElementById('characterCarouselSwipe');
    if (characterCarouselSwipe) {
      // Glissé façon "carte à jouer" : la carte suit le pointeur (souris ou tactile) en direct
      // pendant le drag, puis part en vol (carte suivante) ou revient se recaler, dans les deux cas
      // avec une transition volontairement lente pour un effet posé plutôt qu'un simple slide de tab.
      var charDrag = null;

      characterCarouselSwipe.addEventListener('pointerdown', function (e) {
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        charDrag = { pointerId: e.pointerId, startX: e.clientX, startY: e.clientY, dx: 0, dragging: false };
      });

      characterCarouselSwipe.addEventListener('pointermove', function (e) {
        if (!charDrag || charDrag.pointerId !== e.pointerId) return;
        var dx = e.clientX - charDrag.startX;
        var dy = e.clientY - charDrag.startY;
        if (!charDrag.dragging) {
          if (Math.abs(dx) < 8) return;
          if (Math.abs(dx) < Math.abs(dy) * 1.5) { charDrag = null; return; }
          charDrag.dragging = true;
          characterCarouselSwipe.setPointerCapture(e.pointerId);
          characterCarouselSwipe.style.transition = 'none';
        }
        var idxNow = clamp(ui.characterCarouselIndex, 0, CHARACTER_ORDER.length - 1);
        var blocked = (dx > 0 && idxNow === 0) || (dx < 0 && idxNow === CHARACTER_ORDER.length - 1);
        var followDx = blocked ? dx * 0.35 : dx;
        charDrag.dx = followDx;
        var rotate = clamp(followDx / 18, -8, 8);
        characterCarouselSwipe.style.transform = 'translateX(' + followDx + 'px) rotate(' + rotate + 'deg)';
        characterCarouselSwipe.style.opacity = String(clamp(1 - Math.abs(followDx) / 340, 0.35, 1));
      });

      function endCharDrag(e) {
        if (!charDrag || charDrag.pointerId !== e.pointerId) return;
        var wasDragging = charDrag.dragging;
        var dx = charDrag.dx;
        charDrag = null;
        if (!wasDragging) return;

        var idxNow = clamp(ui.characterCarouselIndex, 0, CHARACTER_ORDER.length - 1);
        var canPrev = idxNow > 0, canNext = idxNow < CHARACTER_ORDER.length - 1;
        var threshold = 90;
        var commitDelta = 0;
        if (dx <= -threshold && canNext) commitDelta = 1;
        else if (dx >= threshold && canPrev) commitDelta = -1;

        characterCarouselSwipe.style.transition = 'transform 360ms cubic-bezier(0.22,0.61,0.36,1), opacity 360ms ease-out';

        if (commitDelta !== 0) {
          var flyX = commitDelta > 0 ? -420 : 420;
          characterCarouselSwipe.style.transform = 'translateX(' + flyX + 'px) rotate(' + (commitDelta > 0 ? -14 : 14) + 'deg)';
          characterCarouselSwipe.style.opacity = '0';
          setTimeout(function () { characterCarouselStep(commitDelta); }, 360);
        } else {
          characterCarouselSwipe.style.transform = '';
          characterCarouselSwipe.style.opacity = '';
        }
      }

      characterCarouselSwipe.addEventListener('pointerup', endCharDrag);
      characterCarouselSwipe.addEventListener('pointercancel', endCharDrag);
    }
  }

  function grimoireStep(delta) {
    var tabs = grimoireTabs();
    var idx = tabs.indexOf(ui.grimoireTab);
    if (idx === -1) idx = 0;
    var newIdx = clamp(idx + delta, 0, tabs.length - 1);
    if (newIdx === idx) return;
    ui.grimoireAnimDirection = delta > 0 ? 'next' : 'prev';
    ui.grimoireTab = tabs[newIdx];
    render();
  }

  function characterCarouselStep(delta) {
    var newIdx = clamp(ui.characterCarouselIndex + delta, 0, CHARACTER_ORDER.length - 1);
    if (newIdx === ui.characterCarouselIndex) return;
    ui.characterCarouselAnimDirection = delta > 0 ? 'next' : 'prev';
    ui.characterCarouselIndex = newIdx;
    ui.characterNotice = null;
    ui.characterImportError = null;
    render();
  }

  function exportCharacterJson(charId) {
    var character = state.characters[charId];
    if (!character) return;
    var dataStr = JSON.stringify(character.savedProfile, null, 2);
    var blob = new Blob([dataStr], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'cantrip-' + charId + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importCharacterJson(charId) {
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json,.json';
    input.style.display = 'none';
    document.body.appendChild(input);
    input.addEventListener('change', function () {
      var file = input.files && input.files[0];
      document.body.removeChild(input);
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function () {
        try {
          var parsed = JSON.parse(String(reader.result));
          if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) throw new Error('invalid');
          sanitizeProfile(parsed);
          state.characters[charId].savedProfile = parsed;
          if (state.activeCharacterId === charId) {
            state.profiles[state.activeProfileIndex] = cloneDeep(parsed);
          }
          ui.characterImportError = null;
          ui.characterNotice = { id: charId, text: 'Personnage importé.' };
          saveState();
          render();
        } catch (e) {
          ui.characterNotice = null;
          ui.characterImportError = 'Fichier JSON invalide.';
          render();
        }
      };
      reader.readAsText(file);
    });
    input.click();
  }

  function onAction(e) {
    var action = e.currentTarget.getAttribute('data-action');
    switch (action) {
      case 'nav': {
        // Filet de sécurité : quitter Paramétrer le Personnage (ex. flèche retour) sans passer par
        // Annuler/Valider abandonne le brouillon en cours plutôt que de le laisser trainer.
        if (ui.view === 'settings-character' && ui.settingsCharacterEditing) {
          ui.settingsCharacterEditing = false;
          ui.settingsCharacterDraft = null;
          ui.settingsLevelError = '';
          ui.disableLevelDialog = null;
        }
        ui.view = e.currentTarget.getAttribute('data-view');
        render();
        break;
      }

      case 'damage': applyDamage(); break;
      case 'heal': applyHeal(); break;

      case 'toggle-spell': {
        var level = parseInt(e.currentTarget.getAttribute('data-level'), 10);
        var idx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
        var l = profile().spellLevels.find(function (x) { return x.level === level; });
        l.used[idx] = !l.used[idx];
        saveState(); render();
        break;
      }
      case 'toggle-class': {
        var crId = e.currentTarget.getAttribute('data-id');
        var cidx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
        var cr = profile().classResources.find(function (x) { return x.id === crId; });
        if (cr) { cr.used[cidx] = !cr.used[cidx]; saveState(); render(); }
        break;
      }
      case 'start-edit-character':
        ui.settingsCharacterEditing = true;
        ui.settingsCharacterDraft = cloneDeep(profile());
        render();
        break;
      case 'cancel-edit-character':
        ui.settingsCharacterEditing = false;
        ui.settingsCharacterDraft = null;
        ui.settingsLevelError = '';
        ui.disableLevelDialog = null;
        render();
        break;
      case 'confirm-edit-character':
        sanitizeProfile(ui.settingsCharacterDraft);
        state.profiles[state.activeProfileIndex] = ui.settingsCharacterDraft;
        ui.settingsCharacterEditing = false;
        ui.settingsCharacterDraft = null;
        ui.settingsLevelError = '';
        ui.disableLevelDialog = null;
        saveState();
        render();
        break;

      case 'add-class-resource': {
        settingsCharacterProfile().classResources.push(makeClassResource('Ressource de Classe', 0));
        render();
        break;
      }
      case 'add-class-counter': {
        settingsCharacterProfile().classResources.push(makeClassResource('Compteur', 0, 'counter'));
        render();
        break;
      }
      case 'counter-inc': {
        var incCrId = e.currentTarget.getAttribute('data-id');
        var incCr = profile().classResources.find(function (x) { return x.id === incCrId; });
        if (incCr) { incCr.current = clamp(incCr.current + 1, 0, incCr.max); saveState(); render(); }
        break;
      }
      case 'counter-dec': {
        var decCrId = e.currentTarget.getAttribute('data-id');
        var decCr = profile().classResources.find(function (x) { return x.id === decCrId; });
        if (decCr) { decCr.current = clamp(decCr.current - 1, 0, decCr.max); saveState(); render(); }
        break;
      }
      case 'remove-class-resource': {
        var removeId = e.currentTarget.getAttribute('data-id');
        var crs = settingsCharacterProfile().classResources;
        var removeIdx = crs.findIndex(function (x) { return x.id === removeId; });
        if (removeIdx !== -1) crs.splice(removeIdx, 1);
        render();
        break;
      }
      case 'move-class-resource-up': {
        var upId = e.currentTarget.getAttribute('data-id');
        var upCrs = settingsCharacterProfile().classResources;
        var upIdx = upCrs.findIndex(function (x) { return x.id === upId; });
        if (upIdx > 0) {
          var upItem = upCrs.splice(upIdx, 1)[0];
          upCrs.splice(upIdx - 1, 0, upItem);
          render();
        }
        break;
      }
      case 'move-class-resource-down': {
        var downId = e.currentTarget.getAttribute('data-id');
        var downCrs = settingsCharacterProfile().classResources;
        var downIdx = downCrs.findIndex(function (x) { return x.id === downId; });
        if (downIdx !== -1 && downIdx < downCrs.length - 1) {
          var downItem = downCrs.splice(downIdx, 1)[0];
          downCrs.splice(downIdx + 1, 0, downItem);
          render();
        }
        break;
      }

      case 'add-attack': {
        settingsCharacterProfile().attacks.push(makeAttack());
        render();
        break;
      }
      case 'remove-attack': {
        var removeAtkId = e.currentTarget.getAttribute('data-id');
        var atks = settingsCharacterProfile().attacks;
        var removeAtkIdx = atks.findIndex(function (x) { return x.id === removeAtkId; });
        if (removeAtkIdx !== -1) atks.splice(removeAtkIdx, 1);
        render();
        break;
      }
      case 'move-attack-up': {
        var upAtkId = e.currentTarget.getAttribute('data-id');
        var upAtks = settingsCharacterProfile().attacks;
        var upAtkIdx = upAtks.findIndex(function (x) { return x.id === upAtkId; });
        if (upAtkIdx > 0) {
          var upAtk = upAtks.splice(upAtkIdx, 1)[0];
          upAtks.splice(upAtkIdx - 1, 0, upAtk);
          render();
        }
        break;
      }
      case 'move-attack-down': {
        var downAtkId = e.currentTarget.getAttribute('data-id');
        var downAtks = settingsCharacterProfile().attacks;
        var downAtkIdx = downAtks.findIndex(function (x) { return x.id === downAtkId; });
        if (downAtkIdx !== -1 && downAtkIdx < downAtks.length - 1) {
          var downAtk = downAtks.splice(downAtkIdx, 1)[0];
          downAtks.splice(downAtkIdx + 1, 0, downAtk);
          render();
        }
        break;
      }
      case 'toggle-attack-melee': {
        var meleeAtkId = e.currentTarget.getAttribute('data-id');
        var meleeAtk = settingsCharacterProfile().attacks.find(function (x) { return x.id === meleeAtkId; });
        if (meleeAtk) { meleeAtk.melee = !meleeAtk.melee; render(); }
        break;
      }

      case 'toggle-level': {
        var lvl = parseInt(e.currentTarget.getAttribute('data-level'), 10);
        var levels = settingsCharacterProfile().spellLevels;
        var sl = levels.find(function (x) { return x.level === lvl; });
        if (!sl.enabled) {
          var lowerLevelsEnabled = levels.filter(function (x) { return x.level < lvl; }).every(function (x) { return x.enabled; });
          if (!lowerLevelsEnabled) {
            ui.settingsLevelError = 'Activez d\'abord les niveaux inférieurs.';
            render();
            break;
          }
          sl.enabled = true;
          ui.settingsLevelError = '';
          render();
        } else {
          var higherLevelsEnabled = levels.some(function (x) { return x.level > lvl && x.enabled; });
          if (higherLevelsEnabled) {
            ui.disableLevelDialog = { level: lvl };
            render();
          } else {
            sl.enabled = false;
            render();
          }
        }
        break;
      }
      case 'cancel-disable-level':
        ui.disableLevelDialog = null;
        render();
        break;
      case 'confirm-disable-level': {
        var disableFrom = ui.disableLevelDialog.level;
        settingsCharacterProfile().spellLevels.forEach(function (x) {
          if (x.level >= disableFrom) x.enabled = false;
        });
        ui.disableLevelDialog = null;
        render();
        break;
      }
      case 'grimoire-tab': {
        var tabValue = e.currentTarget.getAttribute('data-tab');
        ui.grimoireTab = tabValue === 'classe' ? 'classe' : parseInt(tabValue, 10);
        render();
        break;
      }
      case 'toggle-grimoire-filter': {
        var filterKey = e.currentTarget.getAttribute('data-filter');
        ui.grimoireFilters[filterKey] = !ui.grimoireFilters[filterKey];
        render();
        break;
      }
      case 'toggle-concentration': {
        profile().concentration = !profile().concentration;
        saveState(); render();
        break;
      }
      case 'toggle-inspiration': {
        profile().inspiration = !profile().inspiration;
        saveState(); render();
        break;
      }
      case 'skill-inc': {
        var incIdx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
        var incSkill = settingsCharacterProfile().skills[incIdx];
        incSkill.modifier = clamp(incSkill.modifier + 1, -99, 99);
        render();
        break;
      }
      case 'skill-dec': {
        var decIdx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
        var decSkill = settingsCharacterProfile().skills[decIdx];
        decSkill.modifier = clamp(decSkill.modifier - 1, -99, 99);
        render();
        break;
      }
      case 'reset-stats-view':
        ui.statsSearch = '';
        if (document.activeElement && document.activeElement.id === 'statsSearchInput') document.activeElement.blur();
        render();
        break;

      case 'open-gold-modal':
        ui.goldModalDraft = profile().gold;
        ui.goldModalOpen = true;
        render();
        break;
      case 'cancel-gold-modal':
        ui.goldModalOpen = false;
        render();
        break;
      case 'gold-adjust': {
        var goldDelta = parseInt(e.currentTarget.getAttribute('data-delta'), 10);
        ui.goldModalDraft = clamp(ui.goldModalDraft + goldDelta, 0, 10000);
        render();
        break;
      }
      case 'confirm-gold-modal':
        profile().gold = clamp(ui.goldModalDraft, 0, 10000);
        ui.goldModalOpen = false;
        saveState();
        render();
        break;

      case 'open-rest':
        ui.shortRestChecks = { hp: false, spells: false, tempHp: false, classResource: false, counters: false };
        ui.shortRestOpen = true;
        render();
        break;
      case 'cancel-rest':
        ui.shortRestOpen = false;
        render();
        break;
      case 'toggle-rest-check': {
        var key = e.currentTarget.getAttribute('data-key');
        ui.shortRestChecks[key] = !ui.shortRestChecks[key];
        render();
        break;
      }
      case 'confirm-rest':
        confirmRest();
        break;
      case 'confirm-rest-and-prepare':
        confirmRestAndPrepare();
        break;

      case 'open-grimoire-prepare': {
        var prepareBack = e.currentTarget.getAttribute('data-back');
        ui.grimoirePrepareBackView = prepareBack || 'grimoire';
        var validPrepareNames = preparableSpellNames();
        var cleanedPreparedSpells = profile().preparedSpells.filter(function (n) { return validPrepareNames.indexOf(n) !== -1; });
        if (cleanedPreparedSpells.length !== profile().preparedSpells.length) {
          profile().preparedSpells = cleanedPreparedSpells;
          saveState();
        }
        ui.draftPreparedSpells = profile().preparedSpells.slice();
        ui.view = 'grimoire-prepare';
        render();
        break;
      }
      case 'toggle-prepared-spell': {
        var spellName = e.currentTarget.getAttribute('data-name');
        var draftIdx = ui.draftPreparedSpells.indexOf(spellName);
        if (draftIdx === -1) ui.draftPreparedSpells.push(spellName); else ui.draftPreparedSpells.splice(draftIdx, 1);
        render();
        break;
      }
      case 'confirm-grimoire-prepare':
        profile().preparedSpells = ui.draftPreparedSpells.slice();
        saveState();
        ui.view = ui.grimoirePrepareBackView || 'grimoire';
        render();
        break;
      case 'toggle-prepare-filter': {
        var prepareFilterKey = e.currentTarget.getAttribute('data-filter');
        ui.prepareFilters[prepareFilterKey] = !ui.prepareFilters[prepareFilterKey];
        render();
        break;
      }

      case 'character-carousel-step': {
        var carouselDelta = parseInt(e.currentTarget.getAttribute('data-delta'), 10);
        characterCarouselStep(carouselDelta);
        break;
      }
      case 'load-character': {
        var loadId = e.currentTarget.getAttribute('data-id');
        var characterToLoad = state.characters[loadId];
        state.profiles[state.activeProfileIndex] = cloneDeep(characterToLoad.savedProfile);
        state.activeCharacterId = loadId;
        applyTheme();
        ui.characterNotice = null;
        ui.characterImportError = null;
        ui.view = 'tracker';
        saveState(); render();
        break;
      }
      case 'update-character': {
        var updateId = e.currentTarget.getAttribute('data-id');
        if (state.activeCharacterId === updateId) {
          state.characters[updateId].savedProfile = cloneDeep(profile());
          ui.characterNotice = { id: updateId, text: 'Personnage mis à jour.' };
          ui.characterImportError = null;
          saveState(); render();
        }
        break;
      }
      case 'export-character': {
        exportCharacterJson(e.currentTarget.getAttribute('data-id'));
        break;
      }
      case 'import-character': {
        importCharacterJson(e.currentTarget.getAttribute('data-id'));
        break;
      }

      default: break;
    }
  }

  // hp max / temp click-to-edit triggers via delegated ids (added after render since dynamic)
  app.addEventListener('click', function (e) {
    if (e.target && e.target.id === 'hpMaxDisplay') { ui.editingMax = true; render(); }
    if (e.target && e.target.id === 'tempDisplay') { ui.editingTemp = true; render(); }
  });

  // présélectionne le contenu de tout champ texte au focus, pour faciliter la saisie directe
  // (la recherche de compétences est exclue : c'est un filtre en direct, pas une valeur à remplacer)
  app.addEventListener('focusin', function (e) {
    if (e.target && e.target.tagName === 'INPUT' && e.target.type === 'text' && e.target.id !== 'statsSearchInput') {
      e.target.select();
    }
  });

  // Le clavier virtuel mobile ne redimensionne pas toujours la layout viewport (`100dvh` reste
  // plein écran sur certains navigateurs/OS malgré le meta interactive-widget=resizes-content) :
  // sans ça, les éléments flex:none en bas de page (boutons Annuler/Valider, Repos...) se
  // retrouvent masqués sous le clavier. On recale #app sur la visualViewport (qui, elle, reflète
  // toujours la zone réellement visible) à chaque ouverture/fermeture.
  if (window.visualViewport) {
    var viewportMaxHeight = window.visualViewport.height;
    var applyVisualViewport = function () {
      var vh = window.visualViewport.height;
      if (vh > viewportMaxHeight) viewportMaxHeight = vh;
      app.style.height = vh + 'px';
      var keyboardLikelyClosed = vh >= viewportMaxHeight - 80;
      // Page Personnage : le clavier virtuel fait foi, pas seulement le focus DOM du champ — sur
      // certains claviers Android, le fermer via son propre bouton ne déclenche pas de 'blur' sur
      // le champ toujours focus, et à l'inverse son ouverture doit masquer les Caractéristiques/
      // afficher la croix même si le 'focus' n'a pas (encore) été détecté par ailleurs.
      var statsAbilities = document.getElementById('statsAbilitiesBlock');
      var statsReset = document.getElementById('statsResetBtn');
      var statsGold = document.getElementById('statsGoldBadge');
      if (statsAbilities || statsReset) {
        if (keyboardLikelyClosed) {
          if (statsAbilities) statsAbilities.style.display = '';
          if (statsReset) { statsReset.style.opacity = '0'; statsReset.style.pointerEvents = 'none'; }
          if (statsGold) statsGold.style.visibility = '';
        } else {
          if (statsAbilities) statsAbilities.style.display = 'none';
          if (statsReset) { statsReset.style.opacity = '1'; statsReset.style.pointerEvents = 'auto'; }
          if (statsGold) statsGold.style.visibility = 'hidden';
        }
      }
    };
    window.visualViewport.addEventListener('resize', applyVisualViewport);
    applyVisualViewport();
  }

  function applyDamage() {
    var hp = profile().hp;
    if (hp.temp > 0) {
      hp.temp -= 1;
    } else {
      hp.current = clamp(hp.current - 1, 0, hp.max);
    }
    saveState();
    render();
  }

  function applyHeal() {
    var hp = profile().hp;
    if (hp.current >= hp.max) {
      hp.temp = clamp(hp.temp + 1, 0, 999);
    } else {
      hp.current = clamp(hp.current + 1, 0, hp.max);
    }
    saveState();
    render();
  }

  function applyRestChecks() {
    var p = profile();
    var checks = ui.shortRestChecks;
    if (checks.hp) p.hp.current = p.hp.max;
    if (checks.tempHp) p.hp.temp = 0;
    if (checks.spells) {
      p.spellLevels.forEach(function (l) {
        if (l.enabled) l.used = l.used.map(function () { return false; });
      });
    }
    if (checks.classResource) {
      p.classResources.forEach(function (cr) {
        if (cr.type !== 'counter') cr.used = cr.used.map(function () { return false; });
      });
    }
    if (checks.counters) {
      p.classResources.forEach(function (cr) {
        if (cr.type === 'counter') cr.current = cr.max;
      });
    }
  }

  function confirmRest() {
    applyRestChecks();
    ui.shortRestOpen = false;
    saveState();
    render();
  }

  function confirmRestAndPrepare() {
    applyRestChecks();
    ui.shortRestOpen = false;
    ui.grimoirePrepareBackView = 'tracker';
    var validPrepareNames = preparableSpellNames();
    profile().preparedSpells = profile().preparedSpells.filter(function (n) { return validPrepareNames.indexOf(n) !== -1; });
    ui.draftPreparedSpells = profile().preparedSpells.slice();
    ui.view = 'grimoire-prepare';
    saveState();
    render();
  }

  render();

  // ---- PWA service worker (best-effort, no-op if unsupported) ----
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () { /* offline support unavailable, app still works online */ });
    });
  }
})();
</script>
</body>
